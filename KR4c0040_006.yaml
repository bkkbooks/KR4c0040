body:
  text: 權文公集卷六唐權德輿撰雜詩早夏青龍寺致齋慿眺感物因書十四韻寺壁有舅氏庶子詩曉出文昌宫憩兹青蓮宇潔齋奉明祀慿覽傷敻古秦為三月火漢乃一壞土詐力自湮淪霸儀終莽鹵終南橫峻極積翠泄雲雨首夏諒清和芳隂接場圃仁祠閟嚴淨稽首洗靈府虛室僧正禪危梁燕初乳通莊走聲利結駟乃旁午觀化復何如刳心信為愈盛時忽過量弱質本無取靜永環中樞益愧腰下組塵勞期抖擻陟降聊俯僂遺韻留壁間凄然感東武仲秋朝拜昭陵清秋夀原上詔拜承吉卜嘗讀貞觀書及兹幸齋沐文皇昔潛耀隋季自顛覆撫運斯順人救焚非逐鹿神祇戴元聖君父納大麓良將授兵符直臣調鼎餗無疆傳慶祚有截荷亭育仙馭凌紫氛神遊棄黃屋方祇護山迹先正陪巖腹杳杳九嵕深沉沉萬靈肅鳥飛田已闢龍去雲猶簇金氣爽林巒乾岡走崖谷吾皇𢎞孝理率土蒙景福擁佑乃清夷威靈諒回復禮承三公重心愧二卿祿展敬何所伸曽以斧山木拜昭陵出城與張祕監閣老同里臨行别承在史館未歸尋辱清辭輒酬之仲月當南吕晨裝拜穀林逢君在東觀不得話離襟䇿馬緣雲路開緘扣玉音還期才浹日里社酒同斟酬馮監拜昭陵回途中遇雨見示之子共乘軺清秋拜上霄寢宫有上霄門曙霞迎夙駕零雨濕回鑣甘谷行初盡軒臺去漸遙望中猶可辨耘鳥下山椒朔旦冬至攝職南郊因書即事大明南至慶天正朔旦圓丘樂六成文軌盡同堯厯象齋祠忝備漢公卿星辰列位祥光滿金石交音曉奏清更有觀臺稱賀處黃雲捧日瑞升平奉和張監閣老過八陵院題贈杜卿崔員外崇飾山園孝理深萬方同感聖人心已聞東閣招從事每向西垣奉德音公府從容談婉婉賔階清切景沉沉與君跬步如同舍終日相期此盍簮奉和鄭賔客相公攝官豐陵扈從之作時充鹵簿使五輅導靈輼千夫象繚垣行宫移曉漏綵仗下秋原莫究希夷理空懷渙汗恩頥神方蹈道傳聖乃尊尊共祝如山夀俄驚憑几言遐荒七月會肹蠁百靈奔豹尾從風直鸞旗映日翻塗芻聨法從營騎肅旌門杳靄虞泉夕凄清楚挽喧不堪程盡處嗚咽望文園詹事府宿齋絶句清齋四體泰白晝一室空摧頽有古樹騷屑多悲風和王祭酒太社宿齋不得赴李尚書宅會戲書見寄元禮門前勞引望勾龍壇下阻歡娛此時對局空相憶博進何人更樂輸酬裴端公八月十五日夜對月見懷涼夜清秋半空庭皓月圓動搖隨積水皎潔滿晴天多病嘉期阻深情麗曲傳偏懷賞心處同望庾樓前奉和崔閣老清明日候許閣老交直之際辱裴閣老書招云與考功苖曹長先城南遊覽獨行口號因以簡贈時德輿以疾故有阻追遊紫禁宿初回清明花亂開相招直城外逺逺上春臺諌曹將列宿幾處期子玉深竹與清泉家家桃李鮮折芳行載酒勝賞隨君有愁疾自無悰臨風一搔首和張祕監閣老獻嵗過蔣大拾遺因呈兩省諸公并見示二賢同載筆久次入新年焚草淹輕秩藏書厭舊編竹風晴翠動松雪瑞光鮮慶賜行春令從兹佇九遷酬崔舍人閣老冬至日宿直省中奉簡兩掖閣老并見示令節一陽新西垣宿近臣曉光連鳯沼殘漏近雞人白雪飛成曲黃鍾律應均層霄翔迅羽廣陌駐歸輪清切晨趨貴恩華夜直頻輟才時所重九月中楊閣老權知吏部選事分命秩皆真十月中崔閣老正拜本官德輿正除禮部受命前一日分草詔詞左掖期連茹南宫愧積薪九年叨此地回首倍相親八月十五日夜瑶臺寺對月絶句嬴女乘鸞巳上天仁祠空在鼎湖邉涼風遙夜清秋半一望金波照粉田仁祠寺也見後漢書楚王英傳夏至日作璿樞無停運四序相錯行寄言赫曦景今日一隂生二月二十七日社兼春分端居有懷簡所思者清晝開簾坐風光處處生看花詩思發對酒客愁輕社日雙飛燕春分百囀鶯所思終不見還是一含情甲子嵗元日呈鄭侍御明府萬里煙塵合秦吳遂眇然無人來上國灑淚向新年世故看風葉生涯寄海田屠蘇聊一醉猶賴主人賢七夕佳期人不見天上喜新秋玉珮霑清露香車渡淺流東西一水隔迢遞兩年愁别有穿針處微明月映樓嘉興九月寄丹陽親故窮年路岐客西望思茫茫積水曽南渡浮雲失舊鄉海邉尋别墅愁裏見重陽草露荷衣冷山風菊酒香獨謡看墜葉逺日遍秋光更羡登攀處煙花滿練塘九日北樓宴集蕭颯秋風樓上聞霜風漠漠起隂雲不見攜觴王太守空思落帽孟參軍風吟蟋蟀寒偏急酒泛茱萸晚易醺心憶舊山何見日併將愁淚共紛紛奉陪李大夫九日龍沙宴會得遲字龍沙重九會千騎駐旌旗水木秋光淨絲桐雅奏遲煙蕪斂暄色霜菊發寒姿今日從公醉全勝落帽時臘日龍沙會絶句簾外寒江千里色林中樽酒七人期寧知臘日龍沙會却勝重陽落帽時嚴陵釣臺下作絶頂聳蒼翠清湍石磷磷先生晦其中天子不得臣心靈棲皓氣纓冕猶緇塵不樂禁中卧却歸江上春潛驅東漢風日使薄者醇焉用佐天子特此報故人人知大賢心不獨私其身弛張有深致耕釣陶天真奈何清風後擾擾論屈伸交情同市道利欲相紛綸我行訪遺臺仰古懷逸民矰繳鴻鵠逺雪霜松桂新江流去不窮山色凌秋旻人世自今古清輝照無垠曉發武陽館即事書情清晨䇿羸車嘲哳聞春雞行將騎吏親日與情愛暌東風變林樾南畝事耕犂青菰冒白水方塘接廣畦雜英被長坂野草蔓幽蹊舄鹵成沃壤祜株發柔荑芳樹鶯命雛深林麏引麑杳杳途未極團團日已西哲士務纓辨鄙夫戀蓬藜終當稅塵駕盥濯依春溪豐城劔池驛感題龍劔昔未發泥沙相晦藏向非張茂先孰辨斗牛光神物不自達聖賢亦倣徨我行豐城野慷慨心內傷奉使宜春夜渡新塗江陵路至黃蘖館路上遇風雨作草草理夜裝涉江又登陸望路殊未窮指期今已促傳呼戒徒御振轡轉林麓隂雲擁嵓端霔雨當山腹震雷如在耳飛電來照目獸迹不敢窺馬蹄唯務速虔心若齋禮濡體如沐浴萬竅相怒號百泉暗奔瀑危梁慮足跌峻坂憂車覆問我何以然前日受微祿轉知人代事纓組乃徽束向若家居時安枕春夢熟遵途稍巳近候吏來相續曉霽心始安林端見初旭細栁驛細栁肅軍令條侯信殊倫棘門乃兒戲從古多其人神武今不殺介夫如搢紳息駕幸兹地懷哉竦精神渭水吕叟年八十皤然持釣鈎意在靜天下豈唯食營丘師臣有家法小白猶尊周日暮駐征䇿愛兹清渭流宫人斜絶句一路斜分古驛前隂風切切晦秋煙鉛華新舊共冥寞日暮愁鴟飛野田敷水驛空見水名敷秦樓昔事無臨風駐征騎聊復捋髭鬚朝元閣繚垣復道上曽霄十月離宫萬國朝胡馬忽來清蹕去空餘臺殿照山椒石甕寺石甕寒泉勝寶井汲人回挂青絲綆厨煙半逐白雲飛當晝老僧來灌頂盤豆驛盤豆緑雲上古郵望思臺下使人愁江充得計太子死日暮戻園風雨秋晚渡揚子江却寄江南親故返照滿寒流輕舟任搖漾支頥見千里煙景非一狀逺岫有無中片帆風水上天清去鳥滅浦迥寒沙漲樹晚疊秋嵐江空翻宿浪胸中千萬慮對此一清曠回首碧雲深佳人不可望新安江路深潭與淺灘萬轉出新安人逺禽魚淨山深水木寒嘯起青蘋末吟矚白雲端即事遂幽賞何心挂儒冠月夜江行扣船不得寐浩露清衣襟彌傷孤舟夜逺結萬里心幽興惜瑶草素懷寄鳴琴三奏月初上寂寞寒江深江城夜泊寄所思客程殊未極艤棹泊回塘水宿知寒早愁眠覺夜長逺鐘和暗杵曙月照晴霜此夕相思意搖搖不暫忘陪包諫議湖墅路中舉帆同用山字蕭蕭涼雨歇景物望中間風際片帆去煙中獨鳥還斷橋通逺浦野墅接秋山更喜陪清興樽前一解顔富陽陸路又入亂峯去逺程殊未歸煙蘿迷客路山果落征衣攲石臨清淺晴雲出翠微漁潭明夜泊心憶謝玄暉石塘路有懷院中諸公回合千峯裏晴光似畫圖征車隨返照候吏映寒蕪石瀨侵行徑溪雲拂路隅未酬知巳分寧敢學潛夫玉山嶺上作悠悠驅匹馬征路上連岡晚翠深雲竇寒苔淨石梁荻花偏似雪楓葉不禁霜愁見前程逺空郊下夕陽舟行夜泊蕭蕭落葉送殘秋寂寞寒波急暝流今夜不知何處泊斷雲晴月引孤舟曉發桐廬客路去漫漫桐溪上水難扣船乘曉月攲枕聽回灘煙重江楓濕沙平宿鷺寒間吟試一望疑在畫屏看夜泛臨平湖有寄素彩皓通津孤舟入清曠已愛隔簾看還宜卷簾望隔簾卷簾當此時惆悵思君君不知次滕老莊征途無旅館當晝喜逢君羸病仍留客朝朝掃白雲曉曉風搖五兩殘月映石壁稍稍曙光開片帆在空碧晝孤舟漾曖景獨鶴下秋空安流日正晝淨緑天無風晚古樹夕陽盡空江暮靄收寂寞叩船坐獨生千里愁夜猿聲到枕上愁夢紛難理寂寞深夜寒青露落秋水宿嚴陵身羇從事驅征傳江入新安泛暮濤今夜子陵灘下泊自慙相去九牛毛權文公集卷六
