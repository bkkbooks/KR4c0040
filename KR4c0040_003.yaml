body:
  text: 權文公集卷三唐權德輿撰雜詩伏蒙十六叔寄示喜慶感懷三十韻因獻之受氏自有殷樹功𬗟前秦圭田接土宇侯籍相紛綸十二代祖前秦射安丘敬公事具十六國春秋及晉書八代祖周宜昌公七代祖隋鄜城公六代祖皇朝封平涼公皆以勳庸而受爵土也道義集天爵菁華極人文握蘭中臺並折桂東堂春五代伯祖屯田郎中府君叔祖水部員外郎府君同登省闥事其南宮故事曽祖父成都府君曽祖叔梓州府君長安府君同以進士居甲科載在登科記之內也祖德蹈前哲家風播清芬王父古羽林録事席君與席文公建侯友善又與蘇司業源明包著作融為文章之友唱酬往復各有文集先公秉明義大節逢艱屯獨立挺忠孝至誠感神人命書備追錫迹逺道不伸小生諒無似積慶遭昌辰九年西掖忝五轉南宫頻司理因曠職曲臺仍禮神愧非夔龍姿忽佐堯舜君內惟負且乘徒以弱似仁豈足議大政所憂玷彛倫叔父貞素履含章窮典墳百氏若珠貫九流皆翬分黃鍾藴聲調白玉那緇磷清論坐虛室長謡宜幅巾開關接人祠支榮無俗賔種杏當暑熱烹茶含露新井徑交碧鮮軒窗棲白雲飛沉禽魚樂芬馥蘭桂薰經術𢎞義訓息男茂嘉聞筮仕就色養晏居忘食貧四方有趐車上國有蒲輪行當反招隱豈得常退身秦吳路杳杳朔海望沄沄侍坐馳夢寐結懷積昏昕發函捧新詩慈誨情殷勤省躬日三復拜首書諸紳酬李二十二兄主簿馬迹山見寄并序族內兄暢純靜而深直方而文與豫同偶居丹陽丹陽郭北四十里所有馬迹山山有竒峯怪石且多昔賢真仙之所遊踐方外士殷渙然通易經老莊之旨居於山下從舅原均探異好古亦往來棲息其間貞元元年兄以典校祕書調補江陵松滋主簿以地逺不就職豫以環衛冗秩罷漕挽從事且久家居食貧里巷相接其明年兄命駕逰此山豫以疾故不克偕往既而猥辱鍾陵檄召兄自山中以詩一首見貽理精詞逹清滌心府三復其文如至山下終篇則戲以出處之迹見誚故豫復之於此章仍如六十字以就全數杳杳塵外想悠悠區中緣如何戰未勝曽是教所牽逺郊有靈峯夙昔棲真仙鸞聲去已久馬迹空依然丹崖轉初旭碧落凝秋煙松風共蕭颯蘿月想嬋娟內兄藴遐心嘉遁性所便不能棲枳棘且復探雲泉中有冥寂人間讀逍遙篇聨袂共交榮摳衣嘗絶編徐行石上苔靜韻風中絃煙霞濕儒服日月生寥天新詩來起豫璀璨六義全能盡含寫意轉令山水鮮若聞笙鶴聲宛在耳目前登攀阻心賞愁絶空懷賢出處豈異途心冥即真筌暫從西府檄終卧東災田不嫌豫步蹇但恐君行羶如能固曠懷谷口期窮年酬陸四十楚源春夜宿虎丘山對月寄梁四敬之兼見貽之作東風變薊薄時景日妍和更想千峯夜浩然幽意多蕙香襲間趾松露泫喬柯潭影漾霞月石牀封薜蘿夫君非嵗時已負青冥姿龍虎一門盛淵雲四海推駸駸步騕裊婉婉翥長離玄圃盡瓊樹家林輕桂枝聲榮徒外奬恬淡方自適逸氣凌皓清仁祠訪金碧芉眠瑶草秀斷續雲竇滴芳訊發幽緘新詩比良覿故人石渠署美價滿中朝落落杉松直芬芬蘭杜飄雄詞鼓溟海曠度豁煙霄營道幸同術論心皆後凋循環伐木詠緬邈招隱情慙兹擁腫才愛彼潺湲清拘牽尚多故夢想何由并終結方外期不待華髮生酬穆七侍郎早登使院西樓感懷耿耿宵欲半振衣庭戶前浩歌撫長劔臨風泛清絃晴霜麗寒蕪微月露碧鮮杉梧韻幽籟河漢明秋天良夜雖可玩沉憂逾浩然樓中遲啓明林際揮宿煙晨風響鐘鼓曙色映山川滔滔天江駛杲杲朝日懸困窮西南永得見天地全動直相糾紛車從競喧闐鱣鮪躍洪流麕麚倚荒阡嗈嗈白雲鴈嘒嘒清露蟬一氣鼓萬殊晦明相推遷羲和無停鞅不得常少年當令志氣神及此鬢鬚玄豈唯十六族今古稱其賢夫君才氣雄振藻何翩翩詩輕沈隱侯賦擬王仲宣小鳥搶榆枋大鵬激三千與君期晚嵗方結林棲緣奉和李大夫題鄭評事江樓逹士無外纍隱几依南郭茅棟上江開布帆當砌落支頥散華髮攲枕曝靈藥入鳥不亂行觀魚還自樂何時金馬詔早嵗建安作往事盡筌蹄虛懷寄杯杓邦君駐千騎清論時間酌憑檻出煙埃振衣向寥廊心源齊彼是人境勝巖􅊤何必棲冥冥始為避矰繳春遊茅山酬杜評事見寄喜得賞心處春山豈計程連溪芳草合半嶺白雲晴絶澗漱冰碧仙壇挹皓清懷君在人境不共此時情和韓侍御白髮白髮今朝見虛齋曉鏡清乍分霜簡色微映鐡冠生幕下多能事周行挹令名流年未可歎正遇泰階平和邵端公醉後寄于諫議之作莫羡簷前栁春風獨早歸陽和次第發桃李更芳菲和李大夫西山祈雨因感張曲江故事十韻亞相冠貂蟬分憂統十聨火星當永日雲漢倬炎天齋禱期靈貺精誠契昔賢中宵出騶馭清夜旅牲牷觸石看初起隨車應物先雷音生絶巘雨足晦平阡瀟灑四冥合空濛萬頃連歌謡喧澤國稼穡遍原田故事三台盛新文六義全作霖應自此天下待豐年同陸太祝鴻漸崔法曹載華見蕭侍御留後説得衛撫州報推事使張侍御却回前刺史戴員外無事喜而有作三首專城書素至留臺忽報張綱攬轡回共看昨日蠅飛處併是今朝鵲喜來鶴髮州民擁使車人人自説受恩初如今天下無寃氣乞為邦君雪謗書衆人哺啜喜君醒渭水由來不雜涇遮莫雪霜撩亂下松枝竹葉自青青答韋秀才寄一首中峯雲暗雨霏霏水漲花塘未得歸心憶瓊枝望不見幾回虛濕薜蘿衣户部王曹長楊考功崔刑部二院長並同鍾陵使府之舊因以寄贈又陪郎署喜甚常僚因書所懷且敘所知忽驚西江侣共作南宫郎宿昔芝蘭室今兹鴛鷺行子猷美風味左戶推公器含毫白雪飛出匝青萍利子雲嘗燕居作賦似相如間成考課奏别貢賢良書子玉諒貞實持刑慎丹筆秋天鴻鵠姿晚嵗松筠質伊豫誠薄才何幸復趨陪偶來塵右掖空此憶中臺時節東流駛悲歡追往事待月登庾樓排雲上蕭寺盍簮蓮府宴落帽龍沙醉極浦送風帆靈山眺煙翠解頥通善謔喻指窮精義搦管或飛章分曹時案吏雨散與蓬飄秦吳兩寂寥方期全擁腫豈望攝扶搖夜直分三署晨趨共九霄外庭時接武廣陌更連鑣北極星辰拱南薰氣序調欣隨衆君子並立聖明朝貢院對雪以絶句代八行奉寄崔閣老寓宿春闈嵗欲除嚴風密雪絶雙魚思君獨步西垣裏日日含香草詔書初秋月夜中書宿直因呈楊閣老攲枕直廬暇風蟬迎早秋沉沉玉堂夕皎皎金波流對掌喜新命分曹諧舊遊相思玩華彩因感庾公樓唐開州文編逺寄新賦纍惠良藥咏嘆仰佩不覺斐然走筆代書聊書還谷風雨竦庭柯端憂坐空堂多病時節換所思道里長故人朱兩轓出自尚書郎下車今幾時理行逺芬芳瓊瑶覽良訊芣苡滿素囊結根在貴州蠲疾傳古方探擷當五月殷勤逾八行深情婉如此善祝何可忘復有金玉音焕如龍鳯章一聞靈洞説若覩羣仙翔三清飛慶霄百汰成雄鋩體物信無對灑心願相將昔年同旅食終日窺文房春風眺蕪城秋水渡栁楊君為太史氏弱質羇楚鄉今來忝司諫千騎遙相望歸雲夕鱗鱗圎魄夜蒼蒼逺思結鈴閣何人交羽觴佇見徵潁川無為薄淮陽政成看再入列侍爐煙傍待漏假寐夢歸江東舊居十年江浦卧郊園間夜分明結夢魂舍下煙蘿通古寺湖中雲雨到前軒南宗長老知心法東郭先生識化源覺後忽聞清漏曉又隨簮佩入君門祇命赴京途次淮口因書所懷弱植素寡偶趨時非所任感恩再登龍求友皆斷金彪炳覩竒采凄鏘聞雅音適欣佳期接遽歎離思侵靡靡遵逺道忡忡勞寸心難成獨酌謡空奏伐木吟泬寥清冬時蕭索白晝隂交歡諒如昨滯念紛在今因風試矯翼倦飛會歸林向晚清淮駛回首楚雲深省中春晚忽憶江南舊居戲書所懷因寄兩浙親故雜言前年冠獬豸戎府隨賔介去年簮進賢贊導法宫前今兹戴武辨謬列金門彥問我何所能頭冠忽三變野性慣踈間晨趨興暮還花時限清禁霽後愛南山晚景支頥對樽酒舊遊憶在江湖久庾樓栁寺共開襟楓岸煙塘幾攜手結廬常占練湖春猶寄藜牀與幅巾疲羸只欲思三徑戅直那堪備七人更想東南多竹箭縣圃琅玕共䓤蒨裁書且附雙鯉魚偏恨相思未相見寄李衡州時所居即衡州宅片石叢花盡不如庇身三徑豈吾廬主人千騎東方逺唯望衡陽鴈足書寄臨海郡崔稚璋美酒步兵厨古人嘗宦遊赤城臨海嶠君子今督郵吏隱豐暇日琴壺共冥搜新詩寒玉韻曠思孤雲秋志士誠勇退鄙夫自包羞終當就知巳莫戀潺湲流李韶州著書常論釋氏之理貴州有能公遺迹詩以問之常日區中暇時聞象外言曹溪有宗旨一為勘心源馬上贈虛公馬足旱塵深飄纓又滿襟吾師有甘露為洗此時心郴州換印緘遣之際率成三韻因寄李二兄員外使君緘題桂陽印持寄朗陵兄刺舉官猶屈風謡政已成行看換龜組奏最謁承明早發杭州泛富春江寄陸三十一公佐候曉起徒馭春江多好風白波連青雲蕩漾晨光中四望浩無際沉憂將此同未離奔走途但恐成悲翁俯見觸餌鱗仰目凌霄鴻纓塵日已厚心纍何時空區區此人世所向皆樊籠唯應杯中物醒醉為窮通故人縣圃姿瓊樹紛青蔥終當此山去共結蘭桂叢寄侍御從舅初免職歸山東靡靡南軒蕙迎風轉芳滋落落幽澗松百尺無附枝世物自多故逹人心不羈偶陳幕中畫未負林間期感恩從慰薦循性難縶維野鶴無俗質孤雲多異姿清冷松霜泫照灼巖花遲終當稅塵駕來就東山嬉湖上晚眺呈惠上人湖上煙景好鳥飛雲自還幸因居止近日覺性情間獨酌乍臨水清機常見山此時何所憶淨侣話玄關新秋月夜寄故人客心宜靜夜月色淡新秋影落三湘水詩傳八詠樓何窮對酒望幾處捲簾愁若問相思意隨君萬里遊自楊子歸丹陽初遂間居聊呈惠公移疾喜無事卷簾松竹寒稍知名是纍日與靜相歡蹇淺逢機少迂踈應物難只思間夜月共向沃州看月夜過靈徹上人房因贈此身會逐白雲去未洗塵纓還自傷今夜幸逢清淨境滿庭秋月對支郎戲贈張練師月帔飄颻摘杏花相邀洞口勸流霞半酣乍奏雲和曲疑是龜山阿母家戲贈天竺靈隱二寺寺主石路泉流兩寺分尋常鐘磬隔山聞山僧半在中峯住共占青巒與白雲贈廣通上人身隨猿鳥在深山早有詩名到世間客至上方留盥潄龍泓洞水晝潺潺贈老將白草黃雲塞上秋曽隨驃騎出并州轆轤劒折虬鬚白轉戰功多獨不侯權文公集卷三
