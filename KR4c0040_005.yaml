body:
  text: 權文公集卷五唐權德輿撰雜詩送杜尹赴東都商於留異績河洛賀新遷朝選吳公守時權杜尹賢如綸披鳯詔出匣淬龍泉風雨交中土簪裾敞别筵清明人比玉照灼府如蓮佇報司州政徴黃似潁川送孔江州九𣲖潯陽郡分明似畫圖秋光連瀑布晴翠辨香爐才子猒蘭省邦君榮竹符江城多暇日能寄八行無送渾鄧州年少守南陽新恩印綬光輕軒出繞霤利刃發干將風徑初飛葉雲寒方護霜想君行縣處露冕菊潭香甬穚達奚四于十九陳大三侍御夜宴叙各賦二韻滿樹鐡冠瓊樹枝樽前燭下心相知明朝又與白雲逺自古河梁多别離酬别蔡十二見贈伊人茂天爵恬淡卧郊園傲世方隱几說經久顓門浩歌曳柴車詎羡丹轂尊嚴霜被鶉衣不知狐白溫游心羲文際愛我相討論潢汙忽朝宗傳騎令載奔崢嶸嵗隂晚愀愴離念繁别館絲桐清寒郊烟雨昏中飲見逸氣縱談窮化元佇見公車起聖代待乞言揚州與丁山人别將軍易道令威仙華髮清談得此賢惆悵今朝廣陵别遼東後㑹復何年送台州崔録事不嫌臨海逺微祿代躬耕古郡紀綱職扁舟山水程詩因琪樹麗心與瀑泉清盛府知音在何時薦政成送信安劉少府自常州參軍選授相看結離念盡此林中渌夷代輕逺遊上才隨薄祿參卿滯孫楚隱市同梅福吏散時泛絃賔來閒覆局襟情無俗慮談笑成逸躅此路足灘聲羡君多水宿送李城門罷官歸嵩陽城門院在遺補院東與君相識處吏隱在墻東啓閉千門靜逢迎兩掖通罷官多暇日肄業有儒風歸去塵寰外春山桂樹叢送上虞丞越郡佳山水菁江接上虞計程航一葦試吏佐雙鳬雲壑窺仙籍風謡驗地圖因尋黃絹字為我弔曹旴送盧評事婺州省覲知向東陽去晨裝見綵衣客愁青眼别家喜玉人歸漠漠水烟晚蕭蕭楓葉飛雙溪泊􅊑處候吏拜胡威送崔端公郎君入京覲省已見風姿美仍聞藝業勤清秋上國路白晳少年人帶月輕帆疾迎霜綵服新過庭若有問一為說漳濵送張周二秀才謁宣州薛侍郎儒衣兩少年春棹轂溪船湖月供詩興嵐風費酒錢上帆涵浦岸攲枕傲青天不用愁羇旅宣城太守賢送張將軍歸東都舊業功名不復求舊業向東周白草辭邉騎青門别故侯摧殘寶劒拆羸病緑珠愁日暮寒風起猶疑大漢秋送句容王少府簿領赴上都上國路綿綿行人候曉天離亭緑綺奏鄉樹白雲連江露濕征袂山鶯宜泊船春風若為别相顧起樽前送從弟謁員外叔父回歸義興異鄉兄弟少見爾自依然來酌林中酒去耕湖上田何朝逢暑雨幾夜泊漁烟餘力當勤學成名貴少年送梁道士謁夀州崔大夫年少一仙官清羸駕綵鸞洞宫雲渺渺花路水漫漫嵗計芝田熟晨裝月帔寒遙知小山桂五馬待邀歡送鄭秀才貢舉西笑意如何知隨貢舉科吟詩向月露驅馬出烟蘿晚色平蕪逺秋聲候鴈多自憐歸未得相送一勞歌送謝孝亷移家越州家承晋太傅身慕魯諸生又見一帆去共愁千里程沙平古樹迥潮滿曉江晴從此幽深去無妨隱姓名送韓孝亷侍從赴舉貢士去翩翩如君最少年綵衣行不廢儒服代相傳曉月經淮路繁隂過楚天清談遇知巳應訪孝亷船送陸拾遺祇召赴行在鵷鷺承新命翻飛入漢庭歌詩能合雅獻納每論經月曉蜀江迥猿啼楚樹青幸因焚草暇書札訪沉冥送映師歸本寺還歸栁寺去逺逺出人羣苔甃桐華落山忩桂樹薰引泉通絶澗放鶴入孤雲幸許宗雷到清談不昜聞送宇文文府赴官送君當嵗暮斗酒破離顔車騎擁寒水雪雲凝逺山且安黃綬屈莫羡白鷗閒從此圖南路青雲步武間送嶽州溫録事赴任解巾州主簿捧檄不辭遙獨鶴九霄翼寒松百尺條晨裝沾雨雪旅宿候風潮為政閒無事清談肅郡僚送山人歸舊隱工為楚辭賦更著魯衣冠嵗儉山田薄秋深晨服寒世人榮燕頷志士戀漁竿會被公車薦知君久晦難惠上人房宴别方𫀆相引到龍花支策開襟路不賖法味已同香積會禮容疑在少施家逸民羽客期皆至踈竹青苔景半斜究竟相依何處好匡山古社足烟霞送裴秀才貢舉儒衣風貌清去扺漢公卿賔貢年猶少篇章藝已成臨流惜暮景話别起鄉情離酌不辭醉西江春草生送袁太祝衢婺巡覆同用山字校緡稅畝不妨閒清興自隨魚鳥間知君此去足佳句路出桐溪千萬山送湖南李侍御赴本使賦採菱亭詩舊俗採菱處津亭風景和沅江收暮靄楚女發清歌曲岸縈緗葉荒階上白波蘭橈向蓮府一為枉帆過送穆侍御歸東都知君儒服貴綵繡兩相輝婉婉成名後翩翩擁傳歸江深煙霧沒山暗雨雲飛共待酬恩罷相將去息機送崔端公赴度支江陵院三韻照字津亭風雪霽斗酒留征棹星傳指湘江瑶琴多楚調偏愁欲别處黯黯頽陽照送陸太祝赴湖南幕同用送字三韻不憚征路遙定緣賔禮重新知折栁贈舊侣乘籃送此去佳句多楓江接雲夢送李處士歸弋陽山居限姓名中用韻暫來城市意何如却憶葛陽溪上居不憚薄田輸井稅自將嘉句著州閭波翻極浦檣竿出霜落秋郊樹影踈想到家山無俗侣逢迎只是坐籃輿送清洨上人謁信州陸員外暫辭長老去隨緣候曉輕裝寄客船佳句已齊康寶月清談逺指謝臨川灘經水瀨逢新雪路過漁潭宿暝烟暇日若隨千騎出南巖只在郡樓前送别同用闊字三韻耿耿離念繁蕭蕭涼葉脫緇塵素衣敝風露秋江闊想得讀書忩巖花對巾褐送人使之江陵賞字嘉招不辭逺捧檄利攸往行役念前程宴遊暌舊賞征軺星乍動江信潮應上烟水飛一帆霜風搖五兩紛紛别袂舉切切離鴻響後會杳何時悠悠勞夢想餘干贈别張二十二侍御蕪城陌上春風别於越亭邉嵗暮逢驅車又愴南北路返照寒江千萬峯雜言賦得風送崔秀才歸白田限三五六七言得暄字響深澗思啼猿暗入蘋洲暖輕隨栁陌暄淡蕩乍飄雲影芳菲遍發花源寂寞春江别君處和烟帶雨送征軒雜言同用離騷體送張評事襄陽覲省黯離堂兮日晚􅌂壺觴兮送逺逺水霽兮微明杜蘅秀兮白芷生波泫泫兮烟羃羃凝暮色於空碧紛離念兮隨君泝九江兮經七澤君之去兮不可留五采裳兮木蘭舟嶺上逢久别者又别十年曽一别征路此相逢馬首向何處夕陽千萬峰贈别表兄韋卿新讀兵書事護羌腰間寶劔映金章少年百戰應輕别莫笑儒生淚數行古離别人生天地間瞥若六轡馳夭夀既常數奈何生别離跡當中人域正性日已衰是非千萬境杳靄情塵滋出門事何常暫别亦難期冉冉歎流景悠悠限山陂盡此一夕歡華樽㑹前墀雞鳴東方曙夙駕臨通逵欲出强移步欲留難致辭兩情不得已念此留何為天明去已逺寂默居人歸入門復上堂恍恍生驚疑經履同遊處猶言常相隨覽物或臨􅌉翻怪來何遲乃知前日歡本為今日悲持此别後心寧及未見時則知交疏分久久翻易時報君未别後别後當自知權文公集卷五
