  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0040_WYG_002-1a, image: WYG1072/WYG1072-0809a.png}
body:
  text: 權文公集卷二唐權德輿撰雜詩奉和李相公早朝於中書候傳㸃偶書所懷奉呈門下相公中書相公五更鐘漏歇千門扄鑰開紫微殘月下黃道曉光來辨色趍中禁分班列上台祥烟初繚繞威鳯正徘徊斧藻歸全德輪轅適衆材化成風偃草道合鼎調梅渥命隨三接皇恩暢九垓嘉言造膝去喜氣沃心回東閣延多士南山賦有臺陽春那敢和空此詠康哉奉和于司空二十五丈新卜城南郊居接司徒公别墅即事書情奉獻兼呈李裴相公一德承昌運三公翊至尊雲龍諧理代魚水見深恩别墅池塘曉晴郊草木蕃溝塍連杜曲茅土盛于門卜築因登覽經邦每討論退朝鳴玉會入室斷金言材俊依東閣壺觴接後園徑深雲自起風靜葉初翻宰物歸心匠虛中即化源巴人寧敢和空此愧逰藩奉和新卜城南郊居得與衛右丞鄰舍因賦詩寄贈上宰坐論道郊居仍里仁六符既昭晣萬象隨陶鈞旭旦下玉墀鳴騶拂車茵軒窗退殘暑風物迎蕭辰山澤蜃雨出林塘魚鳥馴豈同求羊徑共是羲皇人石君五曹重左戶三壤均居止烟火接逢迎雞黍頻大方本無隅盛德必有鄰千年郢曲後復此聞陽春奉和韋曲莊言懷貽東曲外族諸弟韋曲冠蓋里鮮原鬱青葱公台睦中外墅舍鄰西東騶馭出國門晨曦正曈曨燕居平外土野服參華蟲疆畎分古渠烟霞連灌藂長幼序以齒歡言無不同憶昔全盛時鄖邭播休功代業擴宇內光塵藹墟中慨息多永歎歌詩厚時風小生黍瓜葛慕義斯無窮和王侍郎病中領度支煩迫之餘過西園書堂閒望憑檻輟繁務晴光烟樹分中邦均禹貢上藥驗桐君滿徑風轉蕙卷簾山出雲鏘然玉音發餘興在新文奉和度支李侍郎早朝夙駕趨北闕曉星啓東方鳴騶分騎吏列燭散康莊照灼華簮並逶迤綺陌長腰金初辨色噴玉自生光獻替均三壤貞明集百祥下才叨接武空此愧文昌奉和劉侍郎司徒奉詔伐叛書情呈宰相玉帳元侯重黃樞上宰雄緣情詞律外宣力廟謀中震耀恭天討嚴凝助嵗功行看畫麟閣凛凛有英風奉和鄜州劉大夫麥秋出師遮虜有懷中朝親故天子愛全才故人雄外臺緑油登上將青綬亞中台亭障鳴笳入風雲轉斾來蘭防分杳杳麥壠望莓莓月向雕弓滿蓮依寶劒開行師齊鸛列錫馬盡龍媒壯志徴梁甫嘉招萃楚材千尋推直幹百鍊去纎埃間闊勞相望歡言幸早陪每聨花下騎幾泛竹間杯芳訊雙魚逺流年兩鬢催何時介圭覲攜手詠康哉太原鄭尚書逺寄新詩走筆酬贈因代書賀曉開閶闔出絲言共喜全才鎮北門職重油幢推上略榮兼革履見深恩昔嵗經過同二仲登朝並命慙無用曲臺分季奉齊祠直筆繫年陪侍從芬芳雞舌向南宫伏奏丹墀跡又同公望數承黃紙詔虛懷自號白雲翁戎裝躞蹀紛出祖金印煌煌寵司武時看介士閲犀渠每狎儒生冠章甫晋祠汾水古并州千騎雙旌居上頭新握兵符應感激逺緘詩句更風流緇衣諸侯諒稱美白衣尚書何可比只今鄰閣待丹青努力加餐報天子奉和許閣老酬淮南崔十七端公見寄文行藴良圖聲華挹大巫掄才超粉署駮議在黃樞自得環中辨偏推席上儒八音諧雅樂六轡騁康衢密侍金鏘珮雄才本棄繻爐烟霏瑣闥宫漏滴銅壺舊友雙魚至新文六義敷斷金揮麗藻比玉詠生芻交辟嘗推重單辭忽受誣風波疲賈誼岐路泣楊朱溟漲前程險炎荒旅夢孤空悲鳶跕水翻羡鴈銜蘆故國方迢遞羈愁自鬱紆逺猷來象魏霈澤過畨禺盡室扁舟客還家萬里途索居因仕宦著論擬潜夫帆席來應駃郊園半巳蕪夕陽尋井徑涼吹動纎枯憶昔同驅傳忘懷或據梧幕庭依古剎緡稅給中都瓜步經過慣龍沙眺聽殊春山嵐漠漠秋渚露塗塗德輿建中興元之間與崔同為鹽鐵邑大夫從事楊子既濟寺貞元初德輿受辟於江西亷推崔又知度支院在焉孰謂原思病非關寧武愚方看簮獬豸俄歎縶騊駼芳訊風情在佳期嵗序徂二賢歡最久三益義非無柏悅心應爾松寒志不渝子將陪禁掖亭伯限江湖交分終推轂離憂莫向隅分曹日相見延首憶田蘇奉和李給事省中書情寄劉苗崔三曹長因呈許陳二閣老常寮幾處伏明光新詔聨翩夕拜郎五夜漏清天欲曙萬年枝暖日初長分曹列侍登文石促膝閒謡接羽觴共說漢朝榮上賞豈令三友滯馮唐過張監閣老宅對酒奉酬見贈其年停貢舉里仁無外事徐步一開顔荆玉收難盡齊竽喜暫閒秋風傾菊酒霽景下蓬山不用投車轄甘從倒載還奉和張舍人閣老閣中直夜思聞雅琴因以書事通簡僚友紫垣宿清夜藹藹復沉沉圎月衡漢淨好風松滌深軒忩韻虛籟蘭雪懷幽音珠露銷暑氣玉徽結遐心盛才本殊倫雅誥方在今佇見舒彩翮翻飛鳯歸林和兵部李尚書東亭詩三接履聲退東亭斯曠然風流披鶴氅操割佩龍泉雲卷巖巘疊雨餘松桂鮮豈煩禽尚逰所貴天理全和司門殷員外早秋省中書直夜寄荆南衛象端公共嗟王粲滯荆州才子為郎憶舊逰凉夜偏宜粉署直清言逺待玉人酬風生北渚烟波闊露下南宮星漢秋早晚得為同舍侶知君兩地結離憂酬陸三十二參淅東見寄驄馬别已久鯉魚來自烹殷勤故人意怊悵中林情茫茫重江外杳杳一枝瓊搔首望良覿為君華髮生奉酬張監閣老雪後過中書見贈加兩韻簡南省僚舊寓直久叨榮新恩倍若驚風清五夜永節換一陽生潘鬢年空長齊竽藝本輕常時望連茹今日劇懸旌枉步歡方接含毫思又縈煩君白雪句嵗晏若為情酬主客仲員外見賀正除五年承乏奉如綸才薄那堪侍從臣禁署獨聞清漏曉命書慙對紫泥新周班每喜簮裾接郢曲偏宜諷詠頻憶昔曲臺嘗議禮見君論著最相親奉和太府韋卿閣老左藏庫中假山之作春山仙掌百花開九棘腰金有上才忽向庭中摹峻極如從洞裏見昭回小松巳負干霄狀片石皆疑縮地來都內今朝似方外仍傳麗曲寄雲臺奉和崔評事寄外甥劉同州并呈杜賔客許給事王侍郎昆弟楊少尹李侍御并見寄之作芳訊來江湖開緘粲瑶碧詩因乘黃贈才擅雕龍格深陳名教本諒以仁義積藻思成采章雅音聞皎繹清時左馮翊貴士二千石前日應星文今兹敞華㦸謝公嘗乞墅乞音氣寧氏終相宅往嵗疲草𤣥忘年齊舉白酒酣吟更苦夜艾談方劇棗巷風雨秋石頭烟水夕多逢長者轍不屑諸公辟酷似仰牢之雄詞挹亭伯老驥念千里飢鷹舒六翮叵能捨郊扉來偶朝中客和職方殷郎中留滯江漢初至南宫呈諸公并見寄十嵗别文昌藩符寄武當師貞上介辟恩擢正員郎藻思烟霞麗歸軒印綬光頃佐山南榮加章服還希駐輦問莫自嘆馮唐奉酬從兄南仲見示十九韻晋季天下亂安丘佐關中德輝靄家牒侯籍推時功簮纓盛西州清白傳素風逢時有舒卷繕性無窮通吾兄挺竒資向晦道自充耕鑿汝山下退然安困䝉詩成三百篇儒有一畝宫琴書滿座右芝术生墻東麗藻粲相鮮晨輝艷芳藂清光杳無際皓魄流霜空邦有賢諸侯主盟詞律雄薦賢比文舉理郡邁文翁樓中賞不獨池畔醉每同聖朝闢四門發跡貴名公小生何為者往嵗學雕蟲華簮映武辨一年被微躬開緘捧新詩瓊玉寒青葱謬進空內訟結懷逺忡忡時來無自疑刷翮摩蒼穹酬崔千牛四郎早秋見寄浩歌坐虛室庭樹生凉風碧雲滅竒彩白露萎芳叢感此時物變悠然遐想通偶來被簮組自覺如池龍少年才藻新金鼎世業崇鳯文已彪炳瓊樹何青葱聨鑣長安道接武承明宫君登玉墀上我侍彤庭中疲病多內愧切磋常見同起豫覽新詩逸韵凌秋空相愛每不足因兹寓深𠂻酬靈徹上人以詩代書見寄時在薦福寺坐夏蓮花出水地無塵中有南宗了義人巳取貝多翻半字還將陽焰諭三身碧雲飛處詩偏麗白月圓時信本真更喜開緘銷熱惱西方社裏舊相親酬蔡十二博士見寄四韻蕪城十年别蓬轉居不定終嵗白屋貧獨謡清酒聖風塵韋帶減霜雪松心徑何以浣相思啓元能盡性君著周昜啓元十卷戲和三韻墨翟突不黔范丹甑生塵君今復勞歌鶴髮吹濕薪前詔許真秩何如巾軟輪君貞元十一年以隱君拜命詔書令州府給傳乘詣闕到日授正官李十韶州寄途中絶句使者取報修書之際口號酬贈詔下忽臨山水郡不妨從事恣攀登莫言向北千行鴈别有圖南六月鵬崔四郎協律以詩見寄兼惠蜀琴因以酬贈臨風結煩想客至傳好音白雪緘郢曲朱絃亘蜀琴泠泠響幽韻欵欵寄遐心晚嵗何以報與君期斷金酬馮絳州早秋絳臺感懷見寄良牧閒無事層臺思渺然六條榮印綬三晋辨山川洗幘謳謡合開襟眺聽偏秋光連大鹵霽景下新田葉落徑庭樹人歸曲沃烟武符頒美化亥字訪疑年經術推多識卿曹亦纍遷齊祠常並冕官品每差肩按部青絲騎裁詩白露天知音愧相訪商洛正閒眠酬趙尚書杏園花下醉後見寄時為太常卿春光深處曲江西八座風流信馬蹄鶴髮杏花相映好羡君終日醉如泥酬趙尚書城南看花日晚先歸見寄杜城韋曲遍尋春處處繁花滿目新日暮歸鞍不相待與君同是醉鄉人權文公集卷二
