body:
  text: 權文公集卷八唐權德輿撰雜詩德宗神武孝文皇帝挽歌詞三首覆露雍熙運澄清教化源賡歌凝庶績羽舞被深恩纂業光文祖貽謀屬孝孫恭聞留末命猶是愛元元梯航來萬國玉帛慶三朝湛露恩方浹薰風曲正調晏車悲鹵簿廣樂遏簫韶最愴號弓處龍髯上紫霄常時柏梁宴玉斚恩波遍今日榖林歸靈輼煙雨霏喬山森羽騎渭水擁旌旗仙馭何由見耘田鳥自飛順宗至德大安孝皇帝挽歌三首時充鹵簿使十葉開昌運三辰麗德音薦功期瘞玉昭儉每捐金解澤皇風遍虞泉白日沉仍聞起居注焚奏感人心孝理本憂勤玄功在嗇神睿圖傳上嗣夀酒比家人仙馭三清逺行宫萬象新小臣司吉從還扈屬車塵候曉傳清蹕共瞻宫輅出迎風引綵旒遙想望陵愁弓劔隨雲氣衣冠奉月遊空餘駕龍處搖落鼎湖秋昭德皇后挽歌詞淮水源流逺塗山禮命升往年求故劔今夕祔初陵鸞鏡金波澀翬衣玉彩凝千年子孫慶孝理在蒸蒸大行皇太后挽歌詞三首王氏筮水靈源濬因山祔禮崇從龍開隧路合壁向方中殿帳金根出廞衣玉座空唯餘文母化隂德滿公宫配禮歸清廟靈儀出直城九虞寧厚載一惠易尊名曉漏銅壺澀秋風羽翣輕容車攀望處孺慕切皇情哀笳出長信嗚咽宫車進寶劔入延津淒涼祠殿新青烏靈兆久白燕瑞書頻從此山園夕金波昭玉塵惠昭皇太子梚歌詞二首前星落慶霄薤露逐晨飊宫仗黃麾出仙遊紫府遙空嗟鳳吹去無復雞鳴朝今夜西園月重輪更寂寥東朝聞楚挽羽翿依俙轉天歸京兆新日與長安逺蘭芳落故殿桂影銷空苑騎吹咽不前風悲九旗卷贈文敬太子挽歌詞二首盤石公封重瑶山贈禮尊歸前榮備物樂善積深恩鴈沼寒波咽鸞旌夕吹翻唯餘西靡樹千古灞陵原銅壺晚漏初羽翣擁塗車方外留鴻寶人間得善書清笳悲畫綬朱邸散長裾還似緱山駕飄颻向碧虛贈鄭國莊穆公主挽歌二首追飾崇湯沐遺芳藹禁闈秋原森羽衛夜壑掩容輝睿藻悲難盡公宫望不歸笳簫向煙霧疑是綵鸞飛舊館閉平陽容車啓夀堂露凝蕣英落風度薤歌長淑德圖書在皇慈禮命彰淒涼灞川曲壟樹已成行贈魏國憲穆公主挽歌詞二首漢制榮車服周詩美肅雍禮尊同姓主恩錫大名封外館留圖史隂堂閉德容睿詞悲薤露千古仰芳蹤秦樓曉月殘鹵簿列才官紅綬蘭桂歇粉田風露寒凝笳悲駟馬清鏡掩孤鸞愍册徽音在都人雪涕看贈梁國惠康公主挽歌詞二首外館嬪儀貴中參睿渥深初笄橫白玉盛服鏤黃金風度簫聲逺河低婺彩沉夜臺留册諡悽愴即徽音杳靄異湘川飄颻駕紫煙鳳樓人已去鸞鏡月空懸霧濕湯沐地霜凝脂粉田音容無處所應在玉皇前故太尉兼中書令贈大師西平王挽歌詞翊戴推元老謀猷合大君河山封故地金石表新墳劔履悲長夜笳簫咽暮雲還經誓師處薤露不堪聞故司徒兼侍中贈大傅北平郡王挽歌詞授律勳庸盛居中鼎鼐和佐時調四氣宣力靜三河忽訪天京兆空傳漢伏波今朝麟閣上偏軫聖情多奉和禮部李尚書酬楊著作竹亭歌直城朱戶相邐連九逵丹轂聲闐闐春官自有花源賞終日南山當目前晨搖玉珮趨溫室暮入竹溪疑洞天煙消雨過看不足晴翠鮮飈透深谷獨謡一曲泛流霞間對千竿連淨緑縈回疏鑿隨勝地石磴巖扉光景異虛齋寂寂清籟吟幽澗紛紛雜英墜家承麟趾貴劔有龍泉賜上奉明時事無事人間方外興偏多能以簮纓狎薜蘿常通內學青蓮偈更奏新聲白雪歌風入松雲歸棟鴻飛滅處猶目送蝶舞間時夢忽成蘭臺有客敘交情反照中林曳履聲直為君恩催造膝東方辨色謁承明奉和張僕射朝天行元侯重寄貞師律三郡四封今靜謐丹轂常思闕下來紫泥忽自天中出軍裝喜氣倍超程千騎鳴珂入鳯城周王致理稱申甫今日賢臣見明主拜恩稽首紛無已凝旒前席皇情喜逢時自是山出雲獻可還同石投水昔嵗褒衣梁甫吟當時巳有致君心専城一鼓妖氛靜擁斾十年天澤深日日披誠奉昌運王人織路傳清問仙醖嘗分玉斚濃御間更輟金羈駿元正前殿朝君臣一人負扆百福新宫懸綵仗儼然合瑞氣爐煙相與春萬年枝上東風早珮玉晨趨光景好塗山已見首諸侯麟閣終當畫元老溫室沉沉漏刻移退朝賔侣每相隨雄詞樂職波濤闊曠度交歡雲霧披自古全才貴文武懦夫只解冠章甫見公抽匣百錬光試欲磨鉛諒無取和李中丞慈恩寺清上人院牡丹花歌淡蕩韶光三月中牡丹偏自占春風時過寶地尋香徑已見新花出故叢曲水亭西杏園北濃芳深院紅霞色擢秀全勝珠樹林結根幸在青蓮域艷蕊鮮房次第開含煙洗露照蒼苔龎眉倚仗禪僧起輕翅縈枝舞蝶來獨坐南臺時共美間行古剎情何已花間一曲奏陽春應為芬芳比君子錫杖歌送明楚上人歸佛川上人逺自西天至頭陀行遍國朝寺口翻貝葉古字經手持金䇿聲泠泠護法護身唯振錫石瀨雲溪深寂寂乍來松徑風更寒遙映霜天月成魄後夜空山禪誦時寥寥挂在枯樹枝真法常傳心不住東西南北隨緣路佛川此去何時回應真莫便遊天台馬秀才草書歌大理馬正之二伯英草聖稱絶倫後來學者無其人白眉年少未弱冠落紙紛紛運纎腕初聞之子十嵗餘當時時輩皆不如猶輕昔日墨池學未許前賢團扇書艷彩芳姿相點綴水映荷花風轉蕙三春併向指下生萬象爭分筆端勢有時當暑如清秋滿堂風雨寒颼颼乍疑崩崖瀑水落又見古木飢鼯愁變化縱橫出新意眼看一字千金貴憶昔謝安問獻之時人雖見那得知離合詩贈張監閣老黃葉從風散暗嗟時節換忽見鬢邉霜勿辭林下觴躬行君子道身負芳名早帳殿漢賔儀巾車塞垣草交情劇斷金文律每招尋始知蓬山下如見古人心奉酬禮部閣老轉韻離合見贈祕書監張薦移居既同里多幸陪君子𢎞雅重當朝弓旌早見招植根瓊林圃直夜金閨步勸深子玉銘力競相如賦間闊向春闈日復想光儀格言信難繼木石強為詞禮部權侍郎閣老史館張祕監閣老有離合酬贈之什宿直吟玩聊繼此章中書舍人崔汾脈脈羡佳期月夜吟麗詞諫垣則隨步東觀方承顧雪林消艷陽簡册漏華光坐更芝蘭室千載各芬芳節苦文俱盛即時仍並命翩翻紫霄中羽翮相輝映同前中書舍人楊於陵校德盡圭璋才臣時所揚放情寄文律方茂經邦術王獻偕發揮十載契心期晝遊有嘉話書法無隱辭信兹酬和美言與芝蘭比昨來念吟繹日覺祛蒙鄙同前給事中許孟容史才司祕府文哲今超古亦有擅風騷六聨文墨曹左賢三代意工藝千金字花識從臣謡人推仙閣吏如登崑閬時口誦靈真詞孫簡下威鳯系霜瓊玉枝同前給事中馮伉車馬退朝後申懷在文友動詞宗伯雄重美良史功亦曽吟鮑謝二妙尤增價雨子付反霜鴻戻天匝樹烏啼夜覃思各縱橫早擅希代名息心欲焚硯自靦陪羣英同前戶部侍郎潘孟陽詠歌有離合永夜觀酬答笥中操綵箋竹簡何足編意深俱妙絶心契交情結計彼官接聨言初並清切翔集本相隨羽儀良在斯煙雲競文藻因喜玩新詩同前國子司業武少儀少年慕時彥小悟文多變木鐸比羣英八方流德聲雷陳美交契雨雪音塵繼恩顧各飛翔因詩覩瑰麗傳野絶遺賢人希有盛遷早欽風與雅日詠贈酬篇春日雪寄上張二十九丈大監請招禮部權曹長回文絶句户部侍郎潘孟陽春梅雜落雪發樹幾花開直須盡興飲仁里願同來以下連二首俱係回文體奉酬祕書監張薦遲遲日氣暖漫漫雪天春知君欲醉飲思見此交親酬前酒杯春醉好飛雪晚庭間久憶同前賞中林對逺山五雜組五雜組旗亭客往復還城南陌不得巳天涯謫數名詩一區揚雄宅恬然無所欲二頃季子田嵗晏常自足三端固為纍事物反徽束四體茍不勤安得豐菽粟五侯誠暐煜榮甚或為辱六翮未騫翔虞羅乃相觸七人稱作者杳杳有遐躅八桂挺竒姿森森照初旭九歌傷澤畔怨思徒刺促十翼有格言幽貞謝浮俗星名詩虛懷何所欲嵗晏聊懶逸雲翼謝翩翻松心保貞實風秋景氣爽葉落井徑出陶然美酒酣所謂幽人吉自當輕尺璧豈復掃一室安用簮進賢少微斯可必卦名詩節變忽驚春臨風騁望頻支頥倦書幌步履整山巾時鳥漸成曲雜芳隨意新曙霞連觀闕綺陌麗咸秦天地今交泰雲雷昔遘屯中孚諒可樂書此示家人藥名詩七澤蘭房千里春瀟湘花落石鱗鱗有時浪白微風起坐釣藤隂不見人古人名詩藩宣秉戎寄衡石崇勢位年紀信不留弛張良自愧樵蘇則為愜瓜李斯可畏不顧榮官尊每陳豐畝利家林類巖巘負郭躬斂積忌滿寵生嫌飬蒙恬勝智踈鐘皓月曉晚景丹霞異澗谷永不諼山梁兾無纍頗符生肇學得展禽尚志從此直不疑支離踈世事州名詩寄道士金蘭同道義瓊簡復芝田平楚白雲合幽崖丹桂連松峯明愛景石竇納新泉兾永南山夀歡隨萬福延八音詩金谷盛繁華涼臺列簮組石崇留客醉緑珠當座舞絲淚可銷骨冶容竟何補竹林諒賢人滿酌無所苦匏居容宴豆儒室貴環堵土鼓與汙尊頥神則為愈革道當在早謙光斯可取木鴈才不才吾知飬生主建除詩建節出王都雄雄大丈夫除書加右職騎吏擁前驅滿月張繁弱含霜耀鹿盧平明躍騕裊清夜擊珊瑚定逺功那比平津䇿乃迂執心思報國效節在忘軀破膽銷丹浦顰蛾舞緑珠危冠徒自愛長轂事應殊成績封千室疇勞使五符收功輕驃衛致理邁黃虞開濟今如此英威古不侔閉關草玄者無乃誤為儒六府詩金罍映玉俎賔友紛宴喜木蘭泛方塘桂酒啓皓齒水榭臨空迥酣歌當座起火雲散竒峯瑶瑟韻清徴土梗乃虛論康莊有逸軌榖城一編書談笑佐天子三婦詩大婦刺繡文中婦縫羅裙小婦無所作嬌歌遏行雲丈人且安坐金爐香正薰安語巖巖五嶽鎮方輿八極廓清氛祲除揮金得謝歸里閭象牀角枕支體舒危語被病獨行逢乳虎狂風駭浪失棹櫓舉人看榜聞曉鼓孱夫孽子遇妬母大言華嵩為珮河為帶南交北朔跬步內摶鵬作臘巨鼇鱠伸舒軼出元氣外小言醯雞伺晨駕蚊翼毫端棘刺分畛域蛛絲結構聊廕息蟻垤崔嵬不可陟權文公集卷八
