body:
  text: 權文公集巻一唐權德輿撰賦雜詩傷馴鳥賦紛羽族之多端兮同翾飛而類殊有鸜鵒之㣲禽亦播質於洪鑪因稚子之嬉遊得中園之墜雛恣飲啄以馴擾来目前與座隅爾乃棲以籠檻鎩其羽翼留軒所以為娛俾遐翥之無力乍踉蹌而將舉顧䙰褷而復息雖主人之見容終使䘮天和於自得或親賔至止徽軫徐觸每聞絃而鼓翼亦逗節而翹足貌宛轉以成態聲間關而助曲乍寂寞以閒暇若凝情於相矚理輕毳以自潔類山𤣥之佩玉每翔集以安卑同君子之自牧思謝尚之起舞邁風流之逸躅茍魯昭之不君因乾侯之出辱方渡濟以申儆伊涼德之自覆徴故老之相傳騐曩記之或存在端午之司辰剪其舌而能言巧喉囀以逹情順人心而不諼方渇日以呈材願朱明之駿奔忽愀愴以顦顇響哀音於簾箔竟啁啾而不去若徊翔之有託怳心訝而未辯歘狸狌之攫搏俄斃踣而不勝紛血􅎈以毛落彼葛盧與冶長通鳥獸之音聲闕君子之周防無古人之至精既不能縱爾於遼廓又不能遂爾之生成使異類之得志曽未極其飛鳴則本夫養之之恵適所以害其生生又憶夫清江之使者東海之波臣茍其時之不来則刳膓而涸鱗鷃鐘皷而反悲馬皂棧而多死雖為遇之巳甚固又失其天理甞聞乎聖賢之理物也愚智殊方薫蕕異藏善用無棄兮互見其長各有攸處兮兩不相傷官天地而府萬物由此道而為常吾既悟斯理之不早因失之而後防收視聴以㝠觀兮遂羣性之茫茫洞庭春溜滿賦送陸灞赴荆州湖𣺌渺兮蕩東風以發春春溜滿兮連淨緑以無垠接逺色於青草散晴輝於白蘋及夫反照安流煙花明䴡霞生水底鳥沒空際聼櫂謳之四起見片帆之逺逝杳空曠以澄鮮窮千里於一睇若乃路轉涔陽波連沅湘杜蘅秀兮蕙若芳晚雲翠兮沉夕陽月明露下靄蒼蒼結遐想於騷人兮悄目極以心傷婉婉長離翩翩綵鷁逺泛桃花之浪去從蓮府之辟雲兮水兮指前程於空碧行舟透逺樹賦送嚴謩赴東陽有美一人兮桂為楫蘭為舟透逺樹之晴影泛春江之碧流乍迷雲葉稍映蘋洲凝暮色於愁睇空藹藹以悠悠的的輕帆亭亭逺質喜揚舲之漸近嗟轉岸而還失映㣲波以葱蒨貯嵐翠之䝉宻愴南浦之别離占横塘之風日栁怨别兮楓傷春望不辯兮愁殺人空江邉兮逺郊外紛離緒兮相對顰標落照以㣲眀羃夕烟而又晦波茫茫兮景沉沉思結䌫於清隂惜歸舟之不駐傷逺目以軫離心奉和聖製九月十八日賜百寮追賞因書所懐錫宴朝野洽追歡堯舜情秋堂絲管動水榭烟霞生黄花媚新霽碧樹含餘清同和六律應交泰萬㝢平春藻下中天湛恩闡文明小臣諒何以亦此彯華纓奉和聖製九日言懐賜中書門下及百寮令節在豐嵗皇情喜乂安絲竹調六律簮裾列千官烟霜暮景清水木秋光寒筵開曲池上望盡終南端天文䴡慶霄墨妙驚飛鸞願言黄花酒永奉今日歡奉和聖製重陽日中外同歡以詩言志因示百寮玉醴宴嘉節拜恩歡有餘煌煌菊花秀馥馥茰房舒白露秋稼熟清風天籟虛和聲度簫韶瑞氣深儲胥百辟皆醉止萬方今宴如宸𠂻在化成藻思煥瓊琚㣲臣徒竊抃豈足歌唐虞奉和聖製中春麟德殿會百寮觀新樂仲春藹芳景内廷宴羣臣森森列干戚濟濟趨鈎陳大樂本天地中和序人倫正聲邁咸濩易象含羲文玉爼映朝服金鈿明舞茵韶光雪初霽聖藻風自薫時泰恩澤溥功成行綴新賡歌仰昭囬竊比華封人奉和聖製中和節百官宴集因示所懐萬方慶嘉節燕喜皇澤均曉聞蓂葉初景麗星鳥春藻思貞百度著明並三辰物情舒在陽時令𢎞至仁衢酒和樂被薫絃聲曲新賡歌武弁側永荷𤣥化醇奉和聖製重陽日即事六韻嘉節在陽數至歡朝野同恩隨千鍾洽慶属五稼豐時菊洗露華秋池涵霽空金絲響仙樂劒舄羅宗公天道光下濟睿詞敷大中多慙撃壤曲何以荅堯聰奉和聖製豐年多慶九日示懐寒露應秋杪清光澄曙空澤均行葦厚年慶華黍豐聲明暢八表燕喜陶九功文麗日月合樂和天地同聖言在推誠臣職惟匪躬𤨏細何以報􅀈飛淳化中贈文敬太子廟時享退文舞迎武舞樂章干旄羽籥相虧蔽一進一退殊行綴昔獻三雍盛禮容今陳六佾崇儀制讀榖梁傳二首荀寅士吉射誠乃蔽聰明奈何趙志父専舉晋陽兵下令漢七國借此以為名吾嘉徙薪智禍亂何由生憶昔湨梁㑹豈伊無諸侯羣臣自盟歃君政如贅旒有力則宗楚何人復尊周空文徒爾貶命去更誰尤劉紹相訪夜話因書即事故人愴乆别兹夕欵郊扉山僮漉野醖稺子褰書帷清露泫珠瑩金波流玉徽忘言我造適瞪視君無違但令靜勝躁自使癯者肥不待蘧生年從此知昔非卧病喜惠上人李鍊師茅處士見訪因以贈沉痾結繁慮卧見書忩曙方外三賢人惠然来相親整巾起曵䇿喜非車馬客支郎有佳文新句凌碧雲霓裳何飄飄浩志凌紫氛復有沉㝠士逺係三茅君各言麋鹿性不與簮組羣清言出象繫曠跡逃𤣥纁心源暫澄寂世故方糺紛終當逐師軰巖桂香氲芬多病戯書因示長孺行年未四十已覺百病生眼眩飛蠅影耳厭逺蟬聲甘辛敗六藏氷炭交七情唯思曲肱枕搔首擲華纓古興月中有桂樹無翼難上天海㡳有龍珠下隔萬丈淵人生大限雖百嵗就中三十稱一世晦明烏兎相推遷雪霜漸到雙鬢邉沉憂戚戚多浩歎不得如意居大半一氣暫聚常恐散黄河清兮白石爛感寓殘雨倦攲枕病中時序分秋蟲與秋葉一夜隔窓聞虚室對揺落晤言無與羣㝠心試觀化世故如絲棼但看鳶戾天豈見山出雲下里徒撃節朱絃秘南薫梧桐秀朝陽上有威鳯文終待九成奏来儀瑞吾君跌傷伏枕有勸醲酒者蹔忘所苦因有一絶一杯宜病士四體委胡牀暫得遺行處陶然在醉鄉病中苦熱三伏皷洪爐支離一病夫倦眠身似火渇歠汗如珠悸乏心難定沉煩氣欲無何時洒㣲雨因與好風俱覽鏡見白鬚數莖光鮮特異秋来皎潔白鬚光試脱朝簮學酒狂一曲酣歌還自樂兒孫嬉笑挽衣裳南亭曉坐因以示璩隠几日無事風交松桂枝園廬含曉霽草木發華姿跡似南山隠官從小宰移萬殊同野馬方寸即靈龜弱質常多病流年近始衰圖書傳授處家有一男兒竹徑偶然作退朝此休沐閉戸無塵氛杖䇿入幽徑清風隨此君琴觴恣偃傲蘭蕙相氛氲幽賞方自適林西烟景曛拜昭陵過咸陽墅李子乏二頃揚雄才一㕓伊予此南畆數已踰前賢頃嵗辱明命銘勲鏤貞堅遂兹操書致内顧増缺然乃葺場圃事迨今三四年適因昭陵拜得抵咸陽田田夫競致辭鄉耋爭来前杯盤既羅列雞黍皆珍鮮古稱禄代耕人以食為天自慙廪給厚諒使井税先塗塗溝塍霧漠漠桑柘烟荒蹊没古木精舍臨秋泉池籠豈所安樵牧乃所便終當解纓絡田里諧因縁早春南亭即事虚齋坐清書梅圻栁條鮮節候開新厯筋骸減故年振衣慙艾綬闚鏡嘆華顛獨有開懐處孫孩戯目前璩授京兆府參軍戯書以示兼呈獨孤郎見爾府中趨初官足慰吾老牛還䑛犢凡鳥亦將雛喜至飜成感癡来或欲殊因慙玉潤客應笑此非夫書紳詩和靜有真質斯人稱最靈感物惑天性觸里紛多名禍機生隠㣲智者鑒未形敗禮因近習喆人自居貞當令念慮端鄙嫚不能萌茍非不踰矩焉得遂性情謹之在事初動用各有程千里起歩武白雲自纎莖心源一流放駭浪奔長鯨淵木茍端深枝流則貞清和理通性術悠乆方昭明先師留中庸可以導此生侍從遊後湖讌望絶境殊不逺湖塘直吾廬煙霞旦夕生泛覽誠可娛慈顔俯見喻輟爾詩與書清旭理輕舟嬉遊散煩劬宿雨蕩殘燠恵風與之俱心靈一開曠機巧眇巳踈中流有荷花花實相芬敷田田緑葉映艷艷紅姿舒繁香好風結凈質清露濡丹霞無容輝嫮色亦踟蹰穠芳射水木攲葉遊龜魚化工若有情生植皆不如輕舟任㳂泝畢景乃躊躇家人亦恬曠稚齒皆忻愉素絃激淒清㫖酒盈罇壺夀觴既頻獻樂極随歌呼圓月初出海澄輝来滿湖清光照酒酣頫傾百慮無以兹心目暢敵彼名利途輕肥何為者漿藿自有餘願銷區中累保此湖上居無用誠自適年年翫芙蕖晨坐寓興清晨坐虚齋羣動寂未喧泊然一室内因見萬化源得䘮心既齊清淨教益敦境来毎自惬理勝或不言亭柯見榮枯止水知清渾悠悠世上人此理法難論郊居嵗暮因書所懐養拙方去喧深居絶人事返耕忘帝力樂道踈世累翛然衡茅下便有江海意寜知肉食尊自覺儒衣貴煙霜當暮節水石多幽致三徑日閒安千峯對深䆳䇿藜出村渡岸幘尋古寺月魄清夜琴猿聲警朝寐地偏芝桂長境勝烟霞異獨馬帶晴光踈篁淨寒翠忩前風葉下枕上溪雲至散髪對農書齋心㸔道記清言覈名理開巻窮精義求譽觀朶頥危身陷芳餌紛吾守孤直世業常恐墜就學緝韋編銘心對攲器元和暢萬物動植咸使遂素履期不渝永懷丘中志暮春閒居示同志避諠非傲世幽興樂郊園好古毎開巻居貧常閉門曙鐘来古寺旭日上西軒稍與清境㑹蹔無塵事煩靜看雲起滅閒望鳥飛飜乍問山僧偈時聽漁父言體羸諳藥性事簡見心源冠帶驚年長詩書喜道存小池泉脉湊危棟燕雛喧風入松隂靜花添竹影繁灌園輸井税學稼奉晨昏此外知何有怡然向一罇秋病初愈月夜詠左思招隠詩因而成詠閒吟理輕歩不厭涼風永斷續風際聲清羸月中影螢光拂花露泉脉連桐井心暢百慮銷境閒萬籟靜前賢有遺韻顧我三日省朗懷方自怡星河漸耿耿卧病初愈崔侍御相訪移疾門常掩今朝枉繡衣笑言心乍惬拜伏力猶㣲晚嵗貞筠少貧家上客稀如何忽相訪里巷有清輝夏雨率成呈邑中諸公片雲飛暮雨瀟灑小亭前細響踈無裏㣲涼坐卧間巳深池際水更緑枕前山未敢勞車馬柴扉且閉關與故人夜坐道舊笑語歡今夕煙霞愴昔遊清羸還對月遲暮更逢秋勝理方自得浮名不在求終當製初服相與卧林丘自咎自咎咎何窮飄然蓽戸中清時名未立稔嵗室猶空幽獨慙芳桂飛鳴羡早鴻吟餘何所見歎息向秋風田家即事閒卧藜牀對落暉翛然便覺世情非漠漠稻花資旅食青青荷葉製儒衣山僧相訪期中飰漁父同遊或夜歸待學尚平婚嫁畢渚煙溪月共忘機寓興弱冠無所就百憂鍾一身世德既顛墜素懷亦堙淪風煙隔嵩丘羸疾滯漳濵昭代未通籍豐年猶食貧敢求庖有魚但慮甑生塵俯首愧僮僕蹇歩羞親賔豈伊當途者一一由中人巳矣勿復言吾將問秋旻浩歌杖䇿出蓬蓽浩歌秋興長北風吹荷衣蕭颯景氣涼通逵抵山郭里巷連湖光孤雲凈逺峯緑水溢方塘魚鳥樂天性雜英互芬芳我心獨何為萬慮縈中腸履道身未泰主家謀不臧心為世教牽跡寄翰墨塲出處兩未定羈羸空自傷沉憂不可裁佇立河之梁晚歸茅簷下左右陳壺觴獨酌復長謡放心遊八荒得䘮同一域是非亦何常胡為苦此生矻矻徒自强乃知杯中物可使憂患㤀因兹謝時軰栖息無何鄉與道者同守庚申洞真善救世守夜㸔仙經俾我外持内當兹申配庚齋心巳恬愉澡身自澂明沉沉簾幃下靄靄燈燭清四支動用息一室虚白生收視忘超捨叩齒集神靈伊予嗜欲寡居常痾恙輕三尸既伏竄九藏乃和平無令耳目勝則使性命傾窅然深夜中若與元氣并釋宗稱定慧儒師著誠明𣲖分示三教理詣無二名吉祥能止止委順則生生視履茍無咎天祐期永貞應物智不勞虛中理自㝠豈資金丹術即此駐頺齡丙寅歳苦貧戯題清朝起藜牀雪霜對枯籬家人来告予今日無晨炊鹺醯一已罄薪炭固難期厚生彼何人工拙各異宜間嵗從使檄親賔苦川馳雖非悖而入與出常相隨吳門與南畆頗亦持鎡基有時遇豐年嵗計猶不支顔淵諒賢人陋巷能自怡中憶裴子野泰然傾薄糜愧非古人心戚戚愁朝饑近古猶不及太上那可希奈何時風扇使我正性衰巧智競憂勞展轉生澆漓吾觀黄金印未勝青松枝粗令有魚菽豈復求輕肥顧慙主家拙甘使羣下嗤如何致一杯醉後無所知獨酌獨酌復獨酌滿盞流霞色身外皆虚名酒中有全德風清與月朗對此情何極知非名教自可樂搢紳貴行道何必學狂歌深山對豐草誡言言之或未行前哲所不取方寸雖浩然因之三緘口醉後美禄與賢人相逢自可親願將花栁月盡賞醉鄉春權文公集巻一
