  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0040_WYG_010-1a, image: WYG1072/WYG1072-0854c.png}
body:
  text: 權文公集卷十唐權德輿撰雜詩祇役江西路上以詩代書寄內辛苦事行役風波倦晨暮搖搖結遐心靡靡即長路别來如昨日每見缺蟾兔潮信催客帆春光變江樹官遊豈云愜歸夢無復數愧非超曠姿循此局促步笑言思暇日規勸多逺度鶉服我久安荆叉君所慕伊豫多昧理初不涉世務適因擁腫材成此懶慢趣一身常抱病不復理章句胸中無町畦與物且多忤既非大川楫則守南山霧胡為出處間徒使名利汚羇孤望豫祿孩稚待我餔未能即忘懷恨恨以此故終當稅鞿鞅豈待畢婚娶如何久人寰俯仰學舉措衡茅去迢遰水陸兩馳騖晣晣窺曉星塗塗踐朝露靜聞田鸖起逺見沙鷗聚怪石不易躋急湍那可泝漁商聞逺岸烟火明古渡下碇夜已深上崎波不駐畏途信非一離念紛難具枕席有餘清壺觴無與晤南方出蘭桂歸日自分付北忩留琴書無乃委童孺春江足魚鴈彼此勤尺素早晚到中閨怡然兩相顧夜泊有懷棲鳥向前林暝色生寒蕪孤舟去不息衆感非一途川程方浩渺離思紛鬱紆轉枕眼未熟擁衾淚已濡窘然風水上寢食疲朝晡心想洞房夜知君還向隅自桐廬如蘭溪有寄東南江路舊知名惆悵春深又獨行新婦山頭雲半斂女兒灘上月初明風前蕩揚雙飛蝶花裏間關百囀鶯滿目歸心何處說攲眠搔首不勝情相思樹家寄江東逺身對江西春空見相思樹不見相思人石楠樹石楠紅葉透簾春憶得糚成下錦茵試折一枝含萬恨分明說向夢中人斗子灘斗子灘頭夜已深月華偏照此時心春江風水連天濶歸夢悠掦何處尋黃蘖館驅車振楫越山川候曉通宵冒煙雨青楓浦上魂已銷黃蘖館前心自苦清明日次弋陽自歎清明在逺鄉桐花覆水葛溪長家人定是持新火㸃作孤燈照洞房中書夜直寄贈通籍在金閨懷君百慮迷迢迢五夜永脉脉兩心齊步履疲青瑣開緘倦紫泥不堪風雨夜轉枕憶鴻妻病中寓直代書題寄愚夫何所任多病感君深自謂青春壯寧知白髮侵寢興勞善祝踈懶愧良針寂寞聞宫漏那堪直夜心端午日禮部宿齊有衣服綵結之貺以詩還答良辰當五日偕老祝千年綵縷同心麗輕裾映體鮮寂寥齊晝省欵曲擘香箋更想傳觴處孫孩遍目前酬九日重九共遊娛秋光景氣殊他時頭似雪還對插茱茰和九日從楊氏姊遊秋光風露天令節慶初筵易象家人吉閨門女士賢招邀菊酒㑹屬和栁花篇今日同心賞全勝落帽年上巳日貢院考雜文不遂赴九華觀祓禊之㑹以二絶句申贈三月韶光處處新九華仙洞七香輪老夫留滯何由往珉玉相和正繞身時以沽美玉為詩題禊飲尋春興有餘深情婉婉見雙魚同心齊體如身到臨水煩君便祓除和九華觀見懷貢院八韻上已好風景仙家足芳菲地殊蘭亭㑹人似山隂歸丹竈綴珠掩白雲巖徑微真官集女士虛室涵春輝拘限心杳杳歡言望依依滯兹文墨職坐與琴觴違麗曲滌煩虛幽緘發清機支頥一吟想恨不雙翻飛桃源篇小年嘗讀桃源記忽覩良工施繪事巖徑初欣繚繞通溪風轉覺芬芳異一路鮮雲雜彩霞漁舟逺逺逐桃花漸入空濛迷鳥道寧知掩映有人家龎眉秀骨爭迎客鑿井耕田人世隔不知漢代有衣冠猶說秦家變阡陌石髓雲英甘且香仙翁留飰出青囊相逢自是松喬侣良㑹應殊劉阮郎內子閒吟倚瑶瑟玩此沉沉銷永日忽聞麗曲金玉聲便使老夫思閣筆新月與兒女夜坐聽琴舉酒泥泥露凝葉騷騷風入林以兹皓月圓不厭良夜深列坐屏輕箑放懷絃素琴兒女各冠笄孫孩繞衣襟乃知大隱趣宛若滄洲心方結偕老期豈憚華髮侵笑語向蘭室風流傳玉音愧君袖中字價重雙南金七夕今日雲軿渡鵲橋應非脉脉與迢迢家人競喜開粧鏡月下穿針拜九霄縣君赴興慶宫朝賀載之奉行冊禮因書即事合卺交歡二十年今朝比翼共朝天風傳漏刻香車度日照旌旗綵仗鮮顧我華簮鳴玉珮看君盛服耀金鈿相期偕老宜家處鶴髮魚軒更可憐元和元年䝉恩封成紀縣伯時室中封安喜縣君感慶兼懷聊申賀贈啓土封成紀宜家縣安喜同欣井賦開共受閨門祉珩璜聨采組琴瑟諧宫徴更待懸車時與君歡暮齒河南崔尹即安喜從兄宜于室家四十餘嵗一昨寓書病傳永寫告身既枉善祝因成絶句五色金光鸞鳯飛三川墨妙巧相輝尊崇善祝今如此共待曽𤣥捧翟衣奉使豐陵職司鹵簿通宵涉路因寄內綵仗列森森行宫夜漏深殳鋋方啓路鉦鼓正交音曙月思蘭室前山辨榖林家人念行役應見此時心酬南園新亭宴㑹璩新第慰慶之作時任賔客南亭烟景濃平視中南峯官閒似休沐盡室來相從日抱漢隂甕或成蝴蝶夢樹老欲連雲竹深疑入洞歡言交羽觴列坐儼成行歌吟不能去待此明月光好逑藴明識內顧多慙色不厭梁鴻貧常譏伯宗直豫壻信時英諫垣金玉聲男兒才弱冠射䇿幸成名偃放斯自足翛然去營欲散木固無堪虛舟常任觸大隱本無心喜君流好音相期懸車嵗此地即中林七夕見與諸孫題乞巧文外孫爭乞巧內子共題文隱映花奩對參差綺席分鵲橋臨片月河鼓掩輕雲羡此嬰兒輩歡呼徹曙聞太常寺宿齊有寄轉枕挑燈候曉雞相君應嘆太常妻長年多病偏相憶不遣歸時醉似泥朝回閲樂寄絶句子城風暖百花初樓上龜兹引導車曲罷卿卿理騶馭細君相望意何如中書宿齊有寄銅壺漏滴斗闌干泛灔金波照露盤遙想洞房眠正熟不堪深夜鳯池寒中書送勑賜齊饌戲酬常日每齊眉今朝共解頥遙知大官膳應與衆雛嬉勑賜長夀酒因口號以贈恩霑長夀酒歸遺同心人滿酌共君醉一杯千萬春冬至日宿齊時郡君南內朝謁因寄清齊獨向圓丘拜盛服想君興慶朝明日一陽生百福不辭相望阻寒宵發峽石路上却寄內莎柵東行五谷深千峯萬壑雨沉沉細君幾日路經此應見悲翁相望心貞元七年䝉恩除太常慱士自江東來朝時與郡君同行西兵廟停車祝謁元和八年拜東都留守途次祠下追計前事已二十三年于兹矣時郡君以疾恙續發因代書却寄憶昔辛未嵗詔書下江壖盡室赴禮官脂車雜輜軿行役過梁苑淹留經圃田郡君表姊壻元俯為宣武從事權理宋君州郡從壻李融時為鄭州各淹留纍日秦關信百二征駕逾三千仙掌眺蓮峯靈祠謁金天騶馭儼已駐女巫爭來前動容既紛若展敬方肅然時為女巫所導過於恭敬不能具舉蹇步入國門華簮拱祥煙諌曹逮居守倏巳十六遷及兹東乘轅二十餘三年盛明受恩澤清近皆聨翩忽當禮寺重俄黍相印懸陳力才不任乞骸詞頗堅解龜罷金鼎賜劔猶龍泉鄙夫何所能實賴中饋賢談笑皆體逺針規諒才全拜恩理晨裝詔使來駢闐風生鞍馬疾日出旌旗鮮信宿歷道途曩遊記周旋暫别亦不易沉疴今來痊醫方驗桐君道術依竺乾庶慿神明佑得使疾恙蠲醫工輔氏深于藥清診益切大比丘尼優曇持念精至並約同來纍路將護永懷心如惔引望脰已㾓離披夏雲盡皎鏡秋月圓開緘諷色絲撰日馳平肩延企勞夢寐涕洟暗潺湲想已給經兹還復申祝延攝拜奠清酤相期保華顛逺慙周君較聊擬顧彥先殷勤俟來報淚墨書此篇權文公集卷十
