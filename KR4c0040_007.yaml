body:
  text: 權文公集卷七唐權德輿撰雜詩奉和韋諫議奉送水部家兄上後書情寄諸兄弟仍通簡南宫親舊并呈兩省閣老院長駟牡龍旗慶至今一門儒服輝華簮人望皆同照乘寶家風不重滿籯金護衣直夜南宫靜焚草清時左掖深何幸末班陪兩地陽春欲和意難任奉和史館張閣老以許陳二閣老長愛弟俱尚書郎伯仲同時列在南北省會於左掖因而有詠伯仲盡時賢平輿與潁川桂枝嘗遍折棣蕚更相鮮丹地晨趨並黃扉夕拜聨豈如分侍從來就鳯池邉主客水部二員東西對行二閣老併在左掖也時語以為分就西垣則具美相類故戲書末韻韋賔客宅與諸慱士宴集纍抗乞身章湛恩比上庠賔筵徵稷嗣家法自扶陽簮組歡言久琴壺雅興長隂嵐冒苔石輕籟韻風篁佩玉三朝貴揮金百慮忘因知卧商雒豈勝白雲鄉酬張祕監閣老喜太常中書二閣老與德輿同日遷官相代之作時祕書監亦同日拜命珠樹共飛棲分封受紫泥正名推五字貴仕仰三圭繼組心知沗德輿代太常為禮部腰章事頗齊蓬山有佳句喜氣在新題國子栁博士兼領太常博士輒申賀贈博士本秦官求才帖職難臨風曲臺淨對月璧池寒講學分隂重齋祠曉漏殘朝衣辨色處雙綬更宜看過隱者湖上所居蝸舍映平湖皤然一魯儒唯將酒作聖不厭谷多愚兵法窺黃石天官辨白榆行看軟輪起未可號潛天從叔將軍宅薔薇花開太府韋卿有題壁長句因以和作環列從容蹀躞歸風光駘蕩發紅薇鶯藏密葉宜新霽蝶繞低枝愛晚暉艷色當軒迷舞袖繁香滿徑拂朝衣名卿洞壑仍相近佳句新成和者稀奉和許閣老霽後慈恩寺杏園看花同用花字口號時德輿當直杏花微雨霽灼灼滿瑶華左掖期先至中園景未斜含毫歌白雪藉草醉流霞獨限金閨籍支頥啜茗花奉和陳閣老寒食初假當直從東省往集賢因過史館看木瓜花寄張蔣二閣老晝漏沉沉倦瑣闈西垣東觀閲芳菲繁花滿樹似留客應為主人休浣歸晚秋陪崔閣老張祕監閣老苗考功同遊昊天觀時楊閣老新直未滿以詩見寄斐然酬和有愧蕪音方駕遊何許仙源去復歸縈回留勝賞蕭灑出塵機泛菊賢人至燒丹姹女飛步虛清曉籟隱几吸晨暉竹徑琅玕合芝田沆瀣晞銀鈎三洞字瑶笥六銖衣麗句翻紅藥佳期限紫微徒然一相望郢曲和應稀春日同諸公過兵部王尚書林園休沐君相近時容曳履過花間留客久臺上見春多松色明金艾鶯聲雜玉珂更逢新酒熟相與藉庭莎與沈十九拾遺同遊棲霞寺上方夜於亮上人院會宿二首攝山標勝絶暇日諧想曯縈紓松路深繞繞雲巖曲重樓回樹杪古像鑿山腹人逺水木清地深蘭桂馥層臺聳金碧絶頂摩淨緑下界誠可悲南朝紛在目焚香入古殿待月出深竹稍覺天籟清自傷人世促宗雷此相遇偃放從所欲清論松枝低間吟茗花熟一生如土梗萬慮相桎梏永願事潛師窮年此棲宿偶來人境外心賞幸隨君古殿煙霞夕深山松桂薰巖花點寒溜石磴掃春雲清淨諸天近喧塵下界分名僧康寶月上客沈休文共宿東林夜清猿徹曙聞棲霞寺雲居室一徑縈紆至此窮山僧盥潄白雲中間吟定後更何事石上松枝常有風天竺寺香剎西天寺昔遊如夢中煙蘿迷俗駕猿狖應山童蕭颯松隂靜攲危石棧通雲霞棲半壁丹紺照晴空世纍悲何已心期惜未同相看整歸轡花雨夕濛濛題邵端公林亭春光何處足柱史有林堂鶯囀風初暖花開日欲長畎池通舊水掃徑閲新芳更置盈樽酒時時醉楚狂題隱者所居一徑茅茨下千峯麋鹿羣鴻妻同懶逸漁父每知聞日暮烏擇木天隂山出雲此心終不動鼓腹向堯君題崔山人草堂竹徑茒堂接洞天間持麈尾漱春泉世人車馬不知處時有歸雲到枕前徐孺亭馬上口號并序鍾陵東湖之南有亭亭中有二碑一則故曲江張公所製徐徵君碣一則北海李公所製放生池碑􅐵夫二君子久隨化往而二文之盛傳於天下貞元初余為是邦從事每將迎郊勞多經是間且以其尚賢好生皆醇仁之首也因歎不得與二賢同時論文變損益亭址圯壞苔篆磷趺古風如在感舊依然而通馗在側平湖在下波流轂擊日月無窮因於馬上口號絶句詩一首以寄愀愴湖上荒亭臨水開龜文篆字積莓苔曲江北海今何處盡逐東流去不回哭劉四尚書勒於碑隂士有昔賢人天朝喪守臣才華推獨步聲氣幸相親理析環中妙儒為席上珍笑言成月旦風韻挹天真丹地膺推擇青油寄撫循豈言朝象魏翻是卧漳濵命賜龍泉重追榮密印陳撤絃驚物故庀具見家貧牢落風悲笛汍瀾涕泣巾只嗟蒿里月非復栁營春黃卷碑文在青松隧路新音容無處所歸作北邙塵張工部至薄寒山下有書無由馳報轉車之至倍切悲懷書來逺自薄寒山繚繞洮河出古關今日難裁秣陵報薤歌寥落栁車還工部發引日屬傷足卧疾不遂執紼子春傷足日况有寢門哀元伯歸全去無由白馬來笳簫里巷咽龜筮暮田開片石潺湲淚含悲敘史才從事淮南府過亡友楊校書舊廳感念愀然故人隨化往倐忽今六霜及我就拘限清風留此堂松竹逾映蔚芝蘭自銷亡絶絃罷流水聞笛同山陽頴如氷玉姿粲若鸞鳯章欲翥摧徑翮先秋落貞芳正平賦鸚鵡文考頌靈光二子古不弔夫君今何傷黃墟既杳杳玄化亦茫茫豈必限宿草含悽灑衣裳哭李晦羣崔季文二處士華封西祝堯貴夀多男子二賢無主後貧賤大壯齒未成鴻鵠姿遽頓驊騮趾子淵將叔度自古不得已觀葬者塗芻隨晝哭數里至松門貴盡人間禮寧知逝者魂笳簫出古陌煙雨閉寒門萬古皆如此傷心反不言成南陽墓枯荄沒古基駮蘚蔽豐碑向晚微風起如聞坐嘯時周平西墓英威今寂寞陳迹對崇丘壯志清風在荒墳白日愁窮泉那復曉喬木不知秋嵗嵗寒塘側無人水自流蘇小小墓萬古荒墳在悠然我獨尋寂寥紅粉盡冥寞黃泉深蔓草映寒水空郊曖夕隂風流有佳句吟眺一傷心題栁郎中茅山故居下馬荒階日欲曛潺潺石溜靜中聞鳥啼花落人聲絶寂寞山忩掩白雲哭張十八校書數日前辱書未及還答俄承凶訃藝閣為郎一命初桐州寄傲十年餘魂隨逝水歸何處名在新詩衆不如蹉跎江浦生華髮牢落寒原會素車更憶八行前日到含悽為報秣陵書題亡友江畔舊居寥落留三徑柴扉對楚江蠨蛸集暗壁蜥蜴走寒忩松蓋攲書幌苔衣上酒缸平生斷金契到此淚成雙權文公集卷七
