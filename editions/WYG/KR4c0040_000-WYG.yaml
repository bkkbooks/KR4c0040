  text: 欽定四庫全書集部二
  hash: sha256:12d8190cadcf5eac3a9a3b81ae053c873dee29480bf15c1526bdc2f7417fab40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0040_WYG_000-1a, image: WYG1072/WYG1072-0797a.png}
body:
  text: 權文公集别集類一唐提要臣等謹案權文公文集十巻唐權徳輿撰徳輿字載之天水人官至同平章事事迹具唐書本傳徳輿嘗自纂制集五十巻楊憑序之其孫憲又編其詩文為五十巻楊嗣復序之今制集巳佚文集亦久無傳本此本乃明嘉靖二十年楊慎得之於滇南僅存目録及詩賦十巻劉大謨序而刻之又刪其無書之目録徳輿文集舊目遂不可考惟文苑英華及唐文粹中時時㪚見尚有出此本之外者耳考王士禎居易録載權文公集五十巻註曰詩賦十巻文四十巻碑銘八巻議論二巻記二巻集序三巻贈送序四巻䇿問一巻書二巻䟽表狀五巻祭文三巻稱無錫顧宸藏本劉體仁之子凡冩之以貽士禎者然則徳輿全集康熈中猶存不識何以今所傳者皆楊慎之殘本苐士禎所註巻目以數計之乃八十巻與五十巻之説不合又不識其何故今既無可參證姑仍楊慎本録之焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀權文公集序唐有天下二百二十載用文章顯於時代有其人然而自成童就傳以及考終命解巾筮仕以及鈞衡師保造次必扵是視聴必於是文采皆正色而無駁雜調韻皆正聲而無竒邪滔滔如江河東注不知其極而又處命書綸綍之任専考覆品藻之柄參化成轉翊之勲初中終全而有之得之於相國文公矣公諱徳輿字載之天水人也族望祖宗之逺當官行巳之道語在國史銘於壙而碑於途此不敢詳今所載者因縁文業而已早嵗為淮南江西從事椽管記室之任屬詞詣理奏入而報可移文走檄疆事迎解登朝為起居舍人改駕部員外郎換司勲郎中遷中書舍人凡四任九年専掌詔誥大則發徳音修典冊洒朝廷之利澤増盛徳之形容小則褒才能叙官業區分流品申明沮勸無誕嗣無巧語誠直温潤真王者之言公昔自纂録為制集五十巻託於友人湖南觀察使楊公憑為之序故今不在編次之内其他千名萬狀隨意所屬牢籠今古窮極㣲細周流於親愛情理之間磅礴於勲賢久大之業不為利疚不以菲廢本乎道以行乎文故能獨步當時人人心服非以徳爵齒挾而致之貞元中奉詔考定賢良草澤之士升名者十七人及為禮部侍郎擢進士第七十有二鸞鳯把梓舉集其門登輔相之位者前後十人其他征鎮岳牧文昌掖垣之選不可悉數方且繼居重任者猶森然非精識洞鑒鑒其詞而知其人何以臻此邪憲宗皇帝紹開中興始初英明申戚提法武功既愈文教是圖元和五年冬執政暴疾既瘖且痺未旬日而公作相憲章儒術潤色王度使和聲順氣發自廊廟而後鬯浹於幽遐我之所長時以推戴玉立氷潔無緇磷遷染之譏以文徳自終豈徒然哉嗣復不佞發跡門館儀曹台席皆添前躅公之元子中書舍人璩不幸短命其嗣憲孫泣奉文集求鄙文以冠篇首雖觀於巨海難挹於波濤而籍用白茅所資誠敬其五十巻次第具在集目銀青光禄大夫充集賢殿大學士楊嗣復撰權文公集序夫物常聚扵所好也故棄公好龍天龍聞而下之穆王好仙王母降於瑶池况文章為天地間公器顧有好之而弗得者乎昔歐陽公好古碑刻入咸不憚數千仞之險數千里之遥購而致之觀諸集古録為可徵巳唐權公載之為天水人相憲宗黼黻潤色彬彬可稱可泉胡公以其為鄉先達嘗景仰愛慕思欲誦其詩讀其書皇皇焉求之罔置在翰苑時每與升庵楊公論及升庵好學慕古猶夫可泉也故遂識之心而恒訪之人經今三十稔矣始於滇南士人家偶獲是集重之不啻九鼎太吕惜其目録與詩賦十巻僅存其他作四十巻并自纂制集五十巻俱各散失莫知所在升庵托余轉寄可泉余意以此貽可泉固足以償其平生愿見之懐恐其所未覩者將遂湮没沈鬱終不可得不如梓而行之有是書者庶或見之將不逺千里欣欣然來相告矣寧不為可冀乎若夫權公人品之光明勲業之𢎞逺儒術之純正詞翰之䆳古載在國史及楊公嗣復之序兹弗容贅書此數語葢以見二公嗜好之篤且以為權公全集之囮也序云乎哉
