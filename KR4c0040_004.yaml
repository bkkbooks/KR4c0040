body:
  text: 權文公集卷四唐權德輿撰雜詩奉送韋起居老舅百日假滿歸嵩陽舊居威鳯翔紫氣孤雲出寥天竒采與幽姿縹眇皆自然嘗聞陶唐氏亦有巢由全以兹聳風俗豈必效羇牽大君遂羣方左史蹈前賢振衣去朝市賜告歸林泉滑和固難久循性得所便有名皆畏途無事乃真筌舊壑窮杳窱新潭漾淪漣嵓花落又開山月缺復圓輕䇿透蘿徑幅巾凌翠烟機閒魚鳥狎體和芝术鮮四皓本違難二疏猶待年况今寰海清復此鬢髮𤣥顧慙纓上塵未絶區中緣齊竽終自退心寄嵩峯巔奉送孔十兄賔客承恩致政歸東都舊居逹人曠迹通出處每憶安居舊山去乞身已見抗疏頻優禮新聞詔書許家法遙傳闕里訓心源早遂嵩丘侶南史編年著盛名東朝侍講常虛佇角巾華髮忽自遂命服金龜君更與白雲出岫暫逶迤鴻鵠入冥無處所歸路依依童稚樂都門藹藹壺觴舉能將此道助皇風自可殊途並伊吕送密秀才吏部駮放後歸蜀應崔大理序蜀國本多士雄文似相如之子西南秀名在賢能書薄祿且未及故山念歸與迢迢三千里返駕一羸車玉壘長路盡錦江春物餘此行無愠色知爾戀林廬送袁中丞持節冊南詔五韻淨字西南使星去逺徹通朝聘烟雨僰道深麾幢漢儀盛途輕五尺險水愛雙流淨上國洽恩波外臣遵禮命離堂駐騮馭且盡樽中聖人日送房二十六侍御歸越驛騎歸時􅔕馬蹄蓮花府映若耶溪帝城人日風光早不惜離堂醉似泥送張閣老中丞持節冊弔回鶻旌斾翩翩擁漢官君行常得逺人歡分職南臺知禮重輟書東觀見才難金章玉節鳴騶逺白草黃雲出塞寒欲散别愁唯有醉暫煩賔從駐征鞍送二十叔赴任餘杭尉得琴字拜首直城隂樽開意不任梅仙歸劇縣阮巷奏離琴春草吳門緑秋濤浙水深十年曽旅寓應愜宦遊心奉送十四叔赴任渝州録事絶句得中字隨牒忽離南北巷解巾都吏有清風巴城鎖印六聫靜盡日閒謡廨署中送韋十二丈赴襄城令三韻得栁字留連出關騎斟酌臨岐酒舊業傳一經新官裁五栁去去望行塵青門重回首送薛十九丈授將作主簿分司東都賦得春草芊芊逺郊外杳杳春嵓曲愁處映微波望中連淨緑日暮藉離觴折芳心斷續送正字十九兄歸江東醉後絶句命駕相思不為名春風歸騎出關程離堂莫起臨岐歎文舉終當薦禰衡送張詹事致政歸嵩山舊隱得青字解龜辭漢庭却憶少微星直指常持憲平反更恤刑閒思紫芝侣歸卧白雲扄明詔優筋力安車適性靈羣公來藹藹獨鶴去冥冥想到揮金處嵩吟枕上青送許著作分司東都月旦繼平輿風流仕石渠分曹向瀍洛守職正圖書棣蕚勞相映瓊枝色不如賔朋爭漉酒徒御待巾車異日始離抱維思烹鯉魚送少清赴潤州參軍因思練舊居得朝字二紀樂簞瓢烟霞暮與朝因君宦遊去記得春江潮逺别更搔首初官方折腰青門望離袂魂為阿連銷送濬上人歸揚州禪智寺􅗜露宗通法已傳麻衣笻杖去悠然揚州後學應相待遙想幡花古寺前獻嵗送李十兄赴黔中酒後絶句一樽嵗酒且留歡三峽黔江去路難志士感恩無逺近異時應戴惠文冠送張僕射朝見畢歸鎮青光照目青門曙玉勒雕戈擁騶馭東方連帥南陽公文武吉甫如古風獨奉新恩來謁帝感深更見新詩麗共看三接欲為霖却念百城同望嵗雙旌去去戀儲胥歸路鶯花伴隼旟今日漢庭求上略留侯自有一編書送韋行軍員外赴河陽五代武辨侍明光輟佐中權拜外郎記事還同楚倚相傳經逺自漢扶陽離堂處處羅簮組東望河橋壯鼙鼓三城曉角啓軒門一縣繁花照蓮府上略儒風並者稀翩翩騶騎有光輝只今右職多虛位應待他時伏奏歸送韋中丞奉使新羅得往字淳化洽聲名殊方均惠飬計書重譯至錫命雙旌往星辭北極逺水泛東溟廣斗柄辨霄程天琛冝晝賞孤光洲島迥淨緑烟霞敞展禮盛賔徒交歡覿君長經途勞視聽愴别縈夢想延頸旬嵗期新恩在歸鞅送從翁赴任長子縣令家風本巨儒吏職化雙鳬啓事才方愜臨人政自殊地雄韓上黨秩比魯中都拜首春郊夕離杯莫向隅送從弟廣東歸絶句夏雲如火鑠晨輝欵段羸車整素衣知爾業成還出谷今朝莫愴斷雲飛送王練師赴王屋洞稔嵗在芝田歸程入洞天白雲辭上國青鳥㑹羣仙自以碁銷日寧資藥駐年相看話離合風馭忽泠然送薛溫州得驚字昨日饋連營今來刺列城方期建禮直忽訪永嘉程郡內裁詩暇樓中遲客情慿君減千騎莫遣海鷗驚送黔中裴中丞閣老赴任得回字五諫留中禁雙旌輟上才內臣持鳯詔天廄錫龍媒宴語暌蘭室輝榮亞柏臺懷黃宜命服舉白歎離杯景霽山川迥風清霧露開辰溪分浩渺僰道接縈回勝理環中得殊琛徼外來行看旬嵗詔傳慶在公台送崔諭德致政東歸天子坐法宫詔書下江東懿此嘉遁士蒲車赴丘中褐衣入承明朴略多古風直道侍太子昌言沃宸聰嵓居四十年心與鷗鳥同一朝受恩澤自說如池龍乞骸歸故山纍疏明深𠂻大君不奪志命錫忽以崇旭旦出國門輕裝若秋蓬家依白雲嶠手植丹桂叢竹齊引寒泉霞月相玲瓏曠然解赤綬去逐冥冥鴻送三十叔赴任晉陵心字德輿舊居在丹陽去晋陵百里春雲結暮隂侍坐捧離襟黃綬輕裝去青門芳草深十年塵右職三徑寄遐心便道停橈處應過舊竹林送安南裴都護忽佩交州印初辭列宿文莫言方任逺且貴主憂分逈轉朱鳶路連飛翠羽羣戈船航漲海旌斾卷炎雲絶徼褰帷識名香夾轂焚懷徠通北戶長飬洽南薰暫歎同心阻行看異績聞歸時無所欲薏苡或煩君送别院泛念爾强學殖非貫早從師溫溫禀義方慥慥習書詩計偕來上國宴喜方怡怡經術既修明藝文亦葳蕤伊豫諒無取瑣質荷洪慈偶來二儀曹量力何可支廢業固相受避嫌誠自私徇吾刺促心婉爾康莊姿古人貴直道內訟乖坦夷用兹處大官無乃玷清時羸車出門去悵望交涕洟琢磨貴分隂嵗月若飇馳千里起足下豐年繫鎡䥓茍令志氣堅佇見纓珮隨斑斕五綵服前路春物熙舊逰憶江南環堵留蓬茨湖水白於練蓴羮細若絲别來十三年夢寐時見之寵榮忽踰量荏苒不自知晨興愧華簮止足為靈龜遐路各自愛大來行可期青冥在目前努力調羽儀送工部張曹長大夫奉使西蕃殊鄰覆露同奉使小司空西候車徒出南臺節印雄弔祠將渥命導驛暢皇風故地山河在新恩玉帛通塞雲凝廢壘關月照驚蓬青史書歸日翻輕五利功九華觀宴餞崔十七叔判官赴義武幕兼呈書記蕭校書炎光三伏晝洞府宜幽步宿雨潤芝田鮮風搖桂樹隂隂臺殿敞靡靡軒車駐晚酌臨水情晨裝出關路偏榮本郡辟倍感元臣遇記室有門人因君逹書素送文暢上人東遊桑門許辨才外學接宗雷護法麻衣淨翻經貝葉開宗通知不染妄想自堪哀或結西方社師遊早晚回送靈武范司空上略在安邉吳鈎結束鮮三公臨右地七萃擁中堅舊壘銷烽火新營辨井泉伐謀師以律賈勇士爭先塞迥睛看月沙平逺際天榮薰知屈指應在盛秋前送商州杜中丞赴任安康地里接商於帝命専城總賦輿夕拜忽辭青瑣闥晨裝獨捧紫泥書深山古驛分騶騎芳草閒雲逐隼旟綺皓清風千古在因君一為謝巖居送殷卿罷舉歸淮南舊居計偕十上竟無成忽憶嵓居便獨行志業嘗探絶編義風塵虛作棄繻生嵗儲應歎山田薄里社時逢野醖清惆悵中年羣從少相看欲别倍關情權文公集卷四
