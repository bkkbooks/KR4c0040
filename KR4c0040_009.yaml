body:
  text: 權文公集卷九唐權德輿撰雜詩雜詩五首婉彼嬴氏女吹簫偶簫史綵鸞駕非烟綽約兩仙子神期諒交感相顧乃如此豈比成都人琴心中夜起陽臺巫山上風雨忽清曠朝雲與遊龍變化千萬狀魂交復目斷縹眇難比况蘭澤不可親凝情坐惆悵淇水春正緑上宫蘭葉齊光風兩搖蕩鳴珮出中閨一顧授橫波千金呈瓠犀徒然路傍子恍恍復凄凄碧樹泛鮮飈玉琴含妙曲佳人掩鸞鏡婉婉凝相矚文袿映束素香黛宜􅝇緑寂寞逺懷春何時來比目含顰倚瑶瑟丹慊結繁慮失身不自還萬恨隨玉筯蘼蕪山下路團扇秋風去君看心斷時猶在目成處廣陵詩廣陵實佳麗隋季此為京八方稱輻輳五逹如砥平大斾映空色笳簫發連營層臺出重霄金碧摩皓清交馳流水轂迥接浮雲甍青樓旭日映緑野春風晴噴玉光照地顰蛾價傾城燈前互巧笑陌上相逢迎飄颻翠羽薄淹映紅襦明蘭麝逺不散管絃閒自清曲士守文墨逹人隨性情茫茫竟同盡冉冉將何營且申今日歡莫務身後名肯學諸儒輩書窗誤一生古意家人强進酒酒後能忘情持杯未飲時衆感紛已盈明月照我房庭柯振秋聲空庭白露下枕席凉風生所思萬里餘水闊山縱橫佳期慿夢想未曉愁雞鳴願將一心人當年歡樂平長筵映玉俎素手彈秦筝􅝇睇呈巧笑惠音激凄清此願良未果永懷空如酲雜言和常州李員外副使春日戲題十首隨風栁絮輕映日杏花明無奈花深處流鶯三數聲蘭橈畫舸轉花塘水映風搖路漸香任興不知行近逺更憐微月照鳴榔簷前曉色驚雙燕户外春風舞百花粉署可憐閒對此唯令碧玉泛流霞枕上覺忩外曉怯朝光驚曙鳥花墜露滿芳沼栁如絲風裊裊佳期逺相見少試一望魂杳渺閒庭無事獨步春輝韶光滿目落蘂盈衣芳樹交柯文禽並飛婉彼君子悵然有違對酒不飲橫琴不揮不揮者何知音誠希江春好遊衍處處芳菲積綵舫入花津香車依栁陌緑楊烟裊裊紅蕊鶯寂寂如何愁思人獨與風光隔曙月漸到忩前移樽更就芳筵輕吹乍搖蘭燭春光暗入花鈿絲竹偏宜靜夜綺羅共占韶年不遣通宵盡醉定知辜負風烟露洗百花新簾開月照人緑忩銷暗燭蘭徑掃清塵雙燕頻驚夢三桃競報春相思寂不語珠淚灑紅巾雨歇風輕一院香紅芳緑翠接東墻春衣試出當軒立定被鄰家暗斷腸春風半春光遍栁如絲花似霰歸心勞夢寐逺目傷遊眄可惜長安無限春年年空向江南見相思曲少小别潘郎嬌羞倚畫堂有時裁尺素無事約殘黃鵲語臨粧鏡花飛落繡牀相思不解說明月照空房古樂府光風淡蕩百花吐樓上朝朝學歌舞身年二八壻侍中幼妹承恩兄尚主緑忩珠箔繡鴛鴦侍婢先焚百和香鶯啼自出不知曙寂寂羅幃春夢長渡秋江二首秋江平秋月明孤舟獨夜萬里情萬里情相思逺人不見兮淚滿眼渡秋江兮渺然望秋月兮嬋娟色如練萬里遍我有所思兮不得見不得見兮露寒水深耿遙夜兮傷心秋閨月三五二八月如練海上天涯應共見不知何處玉樓前乍入深閨玳瑁筵露濃香徑和愁坐風動羅帷照獨眠初捲珠簾看不足斜抱箜篌未成曲稍映糚臺臨綺忩遙知不語淚雙雙此時愁望知何極萬里秋天同一色靄靄遙分陌上光迢迢對此閨中憶早晚歸來歡宴同可憐歌吹月明中此夜不堪腸斷絶願隨流影到遼東薄命篇昔住邯鄲年尚少只是嬌羞弄花鳥青樓碧紗大道邉緑楊日暮風裊裊嬋姢玉貌二八餘自憐顔色花不如麗質全勝秦氏女藁砧寧用専城居嵗去年來年漸長青春紅粉全堪賞玉樓珠箔但閒居南陌東城詎來往韶光日日看漸遲標梅既落行有時寧知燕趙娉婷子翻嫁幽并游俠兒年年結束青絲騎出門一去何時至秋月空懸翡翠簾春幃懶卧鴛鴦被沙塞經時不寄書深閨愁獨意何如花前拭淚情無限月下調琴恨有餘離别苦多相見少洞房愁夢何由曉閒看雙燕淚霏霏靜對空牀魂悄悄鏡裏紅顔不自禁陌頭香騎動春心為問佳期早晚是人人總解有黃金放歌行夕陽不駐東流急榮名貴在當年立青春虛度無所成白首銜悲亦何及拂衣西笑出東山君臣道合俄頃間一言一笑玉墀上變化生涯如等閒朱門杳杳列華㦸座中皆是王侯客鳴環動珮暗珊珊駿馬花􅔕白玉鞍十千㪷酒不知貴半醉留賔邀盡歡銀燭煌煌夜將久侍婢金罍㵼春酒春酒盛來琥珀光暗聞蘭麝幾船香乍看皓腕映羅袖微聽清歌發杏梁雙環美人君不見一一皆勝趙飛燕迎杯乍舉石榴裙勻粉時交合歡扇未央鐘漏醉中聞聨騎朝天曙色分雙闕烟雲遙靄靄五衢車馬亂紛紛罷朝鳴珮驟歸鞍今日還同昨日歡嵗嵗年年恣遊宴出門滿路光輝遍一身自樂何足言九族為榮真可羡男兒稱意須及時閉門下帷人不知年光看逐轉蓬盡徒詠東山招隱詩雜言旅館雪晴又覩新月衆興所感因成雜言寥寥深夜雪初晴樓上雲開月漸明池中片影依稀見簾外清光逺近生皎皎晴空疑破鏡廣庭積素偏相映珠簾卷却光更深玉指持來色逾淨夢覺青樓最可憐嬋娟素魄滿寒天天地寥寥同一色秦淮楚江無限極歸鴻斷猿何處聲深閨旅館遙相憶長安五侯華閣開嘉賔列座傾金罍賞明月玩流雪纎手蛾眉座中設清歌一聲無斷絶夜已久樂未闌狐裘獸炭不知寒珠環翠珮聲珊珊履舄紛紜桂袖攢朱顔倚醉盡君歡人生少年全不久相看且勸杯中酒丈夫富貴自有期映雪讀書徒白首玉臺體鶯啼蘭已紅見出鳯城東粉汗宜斜日衣香逐上風情來不自覺暗駐五花􅔕嬋娟二八正嬌羞日暮相逢南陌頭試問佳期不肯道落花深處指青樓隱映羅衫薄輕盈玉腕圓相逢不肯語微笑畫屏前知向遼東去由來幾許愁破顔君莫怪嬌小不禁羞樓上吹簫罷閨中刺繡䦨佳期不可見盡日淚潺潺淚盡珊瑚枕魂銷玳瑁牀羅衣不忍看羞見繡鴛鴦君去期花時花時君不至簷前雙燕飛落妾相思淚空閨滅燭後羅幌獨眠時淚盡腸欲斷心知人不知秋風一夜至吹盡後庭花莫作經時别西鄰是宋家獨自披衣坐更深月露寒隔簷腸欲斷爭敢下階看昨夜裙帶解今朝蟢子飛鉛華不可棄莫是藳砧歸萬里行人至深閨夜未眠雙眉燈下掃不待鏡臺前贈友人時友人新有别恨者知向巫山逢日暮輕袿玉佩暫淹流曉隨雲雨歸何處還是襄王夢覺愁舟行見月月入孤舟夜半晴寥寥霜鴈兩三聲洞房燭影在何處欲寄相思夢不成雜興五首叢鬢愁眉時勢新初笄絶代北方人一顰一笑千金重肯似成都夜失身乍聽絲聲似竹聲又疑丹穴九雛驚金波露洗淨於晝寂寞不堪深夜情琥珀樽開月映簷調絃理曲指纎纎含羞斂態勸君住更奏新聲刮骨鹽乳燕雙飛鶯亂啼百花如繡照深閨新粧對鏡知無比微笑時時出瓠犀巫山雲雨洛川神珠襻香腰穩稱身惆悵糚成君不見含情起立問傍人權文公集卷九
